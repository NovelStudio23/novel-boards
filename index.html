  /* ===================== Reorder cuts (drag, orientation-aware) ===================== */
  function onHandlePointerDown(e, id, unitEl){
    if(!editMode || appMode === 'trash') return;
    if(e.pointerType === 'mouse' && e.button !== 0) return;
    e.preventDefault();
    const portrait = isPortrait();
    const pointerId = e.pointerId;
    const startX = e.clientX, startY = e.clientY;
    const startScroll = portrait ? filmstripEl.scrollTop : filmstripEl.scrollLeft;
    let dragging = false;

    function computeTargetIndex(clientX, clientY){
      /* Re-query sibling rects on every call — caching them once at drag-start goes stale
         the moment autoscroll fires, which is what caused the reorder jitter. */
      const otherEntries = Array.from(filmstripEl.querySelectorAll('.cut-unit'))
        .filter(el => el.dataset.unitId !== id)
        .map(el => ({ id: el.dataset.unitId, rect: el.getBoundingClientRect() }));
      let count = 0;
      for(const o of otherEntries){
        const mid = portrait ? (o.rect.top + o.rect.height / 2) : (o.rect.left + o.rect.width / 2);
        const val = portrait ? clientY : clientX;
        if(val > mid) count++;
      }
      return count;
    }
    let currentTarget = computeTargetIndex(startX, startY);

    let scrollDir = 0;
    let rafId = null;
    function autoScrollLoop(){
      if(scrollDir !== 0){
        if(portrait) filmstripEl.scrollTop += scrollDir * 14;
        else filmstripEl.scrollLeft += scrollDir * 14;
      }
      rafId = requestAnimationFrame(autoScrollLoop);
    }

    function onMove(ev){
      if(ev.pointerId !== pointerId) return;
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      if(!dragging && Math.hypot(dx, dy) > 7){
        dragging = true;
        unitEl.classList.add('dragging');
        if(!rafId) rafId = requestAnimationFrame(autoScrollLoop);
      }
      if(dragging){
        /* The item stays in normal flow, so container autoscroll already moves it on its own
           along the scrolling axis; compensate the manual translate by that same scroll delta
           so it doesn't double-move and drift away from the finger. The other (damped) axis
           never scrolls, so it's left as raw pointer movement. */
        const scrollDelta = (portrait ? filmstripEl.scrollTop : filmstripEl.scrollLeft) - startScroll;
        const adjDx = portrait ? dx : dx + scrollDelta;
        const adjDy = portrait ? dy + scrollDelta : dy;
        const primary = portrait ? adjDy : adjDx;
        const rot = Math.max(-4, Math.min(4, primary / 40));
        unitEl.style.transform = portrait
          ? 'translate(' + (dx * 0.12) + 'px,' + adjDy + 'px) scale(1.035) rotate(' + rot + 'deg)'
          : 'translate(' + adjDx + 'px,' + (dy * 0.12) + 'px) scale(1.035) rotate(' + rot + 'deg)';
        const contRect = filmstripEl.getBoundingClientRect();
        const edge = 50;
        if(portrait){
          if(ev.clientY < contRect.top + edge) scrollDir = -1;
          else if(ev.clientY > contRect.bottom - edge) scrollDir = 1;
          else scrollDir = 0;
        } else {
          if(ev.clientX < contRect.left + edge) scrollDir = -1;
          else if(ev.clientX > contRect.right - edge) scrollDir = 1;
          else scrollDir = 0;
        }
        currentTarget = computeTargetIndex(ev.clientX, ev.clientY);
      }
    }

    function onUp(ev){
      if(ev.pointerId !== pointerId) return;
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.removeEventListener('pointercancel', onUp);
      scrollDir = 0;
      if(rafId){ cancelAnimationFrame(rafId); rafId = null; }

      if(dragging){
        unitEl.classList.remove('dragging');
        unitEl.style.transform = '';
        const arr = state.order.filter(x => x !== id);
        arr.splice(currentTarget, 0, id);
        const changed = arr.join(',') !== state.order.join(',');
        if(changed) pushUndoSnapshot();
        state.order = arr;
        if(changed) saveOrder();
        renderFilmstrip();
        requestAnimationFrame(() => flashUnit(id));
      } else {
        toggleUnitMenu(id);
      }
    }

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
  }

  function flashUnit(id){
    /* Only one of these exists at a time — .cut-unit in basic view, .tile in tile view. */
    const unit = filmstripEl.querySelector('.cut-unit[data-unit-id="' + id + '"], .tile[data-unit-id="' + id + '"]');
    if(!unit) return;

  }

  /* ===================== Insert / delete ===================== */
  function insertCut(index){
    if(!editMode || appMode === 'trash') return;

    if(state.order.length === 0) inheritedScene = 'S#1';
    else if(index > 0) inheritedScene = state.cuts[state.order[index - 1]].scene || '';
    else inheritedScene = state.cuts[state.order[0]].scene || '';
    state.cuts[id] = { id, scene: inheritedScene, notes: '', image: null };

  function deleteCut(id){

    resortTrashOrder();

    saveTrashOrder();

  function jumpToCut(id){

      requestAnimationFrame(() => flashUnit(id));

  /* ===================== Global undo / redo (structural changes) ===================== */
  function snapshotState(){
    return { order: state.order.slice(), trashOrder: (state.trashOrder || []).slice(), cuts: JSON.parse(JSON.stringify(state.cuts)) };
  }
  function applySnapshot(snap){
    state.order = snap.order.slice();
    state.trashOrder = (snap.trashOrder || []).slice();
    state.cuts = JSON.parse(JSON.stringify(snap.cuts));
  }
  function pushUndoSnapshot(){
    undoStack.push(snapshotState());
    if(undoStack.length > MAX_UNDO) undoStack.shift();
    redoStackGlobal = [];
    updateUndoRedoButtons();
  }
  function persistWholeState(){
    saveOrder();
    saveTrashOrder();
    Object.keys(state.cuts).forEach(id => saveCut(id));
  }
  function doUndo(){
    if(undoStack.length === 0) return;
    const current = snapshotState();
    const prev = undoStack.pop();
    redoStackGlobal.push(current);
    applySnapshot(prev);
    persistWholeState();
    renderFilmstrip();
    renderScenesList();
    updateUndoRedoButtons();
  }
  function doRedo(){
    if(redoStackGlobal.length === 0) return;
    const current = snapshotState();
    const next = redoStackGlobal.pop();
    undoStack.push(current);
    applySnapshot(next);
    persistWholeState();
    renderFilmstrip();
    renderScenesList();
    updateUndoRedoButtons();
  }
  function updateUndoRedoButtons(){
    const u = document.getElementById('topUndoBtn'), r = document.getElementById('topRedoBtn');
    if(u) u.classList.toggle('disabled', undoStack.length === 0);
    if(r) r.classList.toggle('disabled', redoStackGlobal.length === 0);
  }
  function resetUndoHistory(){
    undoStack = []; redoStackGlobal = []; updateUndoRedoButtons();
  }

  /* ===================== Scene auto-sort / reposition ===================== */
  function resortOrderByScene(){
    const withIndex = state.order.map((id, i) => ({ id, i, n: parseSceneNumber(state.cuts[id].scene) }));
    withIndex.sort((a, b) => {
      const an = a.n === null ? Infinity : a.n;
      const bn = b.n === null ? Infinity : b.n;
      if(an !== bn) return an - bn;
      return a.i - b.i;
    });
    state.order = withIndex.map(x => x.id);
  }

  function moveCutToEndOfScene(id, targetScene){
    const curIdx = state.order.indexOf(id);
    if(curIdx === -1) return;
    state.order.splice(curIdx, 1);
    if(!targetScene){ state.order.push(id); return; }
    let lastIdx = -1;
    state.order.forEach((oid, i) => { if((state.cuts[oid].scene || '').trim() === targetScene) lastIdx = i; });
    if(lastIdx === -1) state.order.push(id);
    else state.order.splice(lastIdx + 1, 0, id);
  }

  function applySceneReordering(){
    if(sceneEditedIds.size === 0) return;
    pushUndoSnapshot();
    sceneEditedIds.forEach(id => {
      if(!state.cuts[id]) return;
      moveCutToEndOfScene(id, (state.cuts[id].scene || '').trim());
    });
    sceneEditedIds.clear();
    resortOrderByScene();
    saveOrder();
    renumberAllScenesSequentially();
    renderFilmstrip();
    renderScenesList();
  }

  /* Moves a single cut from the main order into trash, freezing its scene/shot number as of
     this moment — trash display reads these frozen fields instead of cut.scene/position so a
     trashed shot's "last known" numbering doesn't drift as other things are trashed or restored
     around it. Caller is responsible for pushUndoSnapshot/save/render. */
  function moveCutToTrash(id, frozenIdx){
    const idx = state.order.indexOf(id);
    if(idx === -1) return false;
    const cut = state.cuts[id];
    if(cut){
      cut.trashedScene = cut.scene || '';
      cut.trashedShotNumber = (frozenIdx != null ? frozenIdx : idx) + 1;
      cut.trashedAt = Date.now();
    }
    state.order.splice(idx, 1);
    if(!state.trashOrder.includes(id)) state.trashOrder.push(id);
    return true;
  }

  /* Trash sort: most-recently-trashed first, then by the frozen scene number, then frozen
     shot number for ties (e.g. an entire scene trashed together, all at the same timestamp). */
  function resortTrashOrder(){
    const withMeta = state.trashOrder.map((id, i) => {
      const cut = state.cuts[id];
      return {
        id, i,
        trashedAt: cut && cut.trashedAt ? cut.trashedAt : 0,
        sceneNum: cut ? parseSceneNumber(cut.trashedScene) : null,
        shotNum: cut && cut.trashedShotNumber != null ? cut.trashedShotNumber : 0
      };
    });
    withMeta.sort((a, b) => {
      if(a.trashedAt !== b.trashedAt) return b.trashedAt - a.trashedAt;
      const asn = a.sceneNum === null ? Infinity : a.sceneNum;
      const bsn = b.sceneNum === null ? Infinity : b.sceneNum;
      if(asn !== bsn) return asn - bsn;
      if(a.shotNum !== b.shotNum) return a.shotNum - b.shotNum;
      return a.i - b.i;
    });
    state.trashOrder = withMeta.map(x => x.id);
  }

  /* Renumbers every remaining scene sequentially (1, 2, 3, ...) in their current order — used
     after any operation that can leave a gap, like moving or trashing a whole scene. */
  function renumberAllScenesSequentially(){
    const groups = computeSceneGroups();
    if(groups.length === 0) return;
    applySceneRenumbering(groups.map(g => g.scene));
  }

  /* Moves every shot in sourceScene into the end of targetScene, then renumbers every
     remaining scene sequentially so trashing/moving a middle scene never leaves a gap
     (e.g. 1,2,3,4 with 2 moved into 1 becomes 1,2,3 — not 1,3,4). */
  function moveSceneInto(sourceScene, targetScene){
    const affectedIds = state.order.filter(id => (state.cuts[id].scene || '').trim() === sourceScene);
    if(affectedIds.length === 0) return;
    pushUndoSnapshot();
    affectedIds.forEach(id => { state.cuts[id].scene = targetScene; });
    affectedIds.forEach(id => moveCutToEndOfScene(id, targetScene));
    resortOrderByScene();
    saveOrder();
    affectedIds.forEach(id => saveCut(id));
    renumberAllScenesSequentially();
    renderFilmstrip();
    renderScenesList();
  }
  async function renameScene(sceneText){
    closeAllSceneMenus();
    const number = parseSceneNumber(sceneText);
    if(number === null) return; /* no number to anchor the rename to — shouldn't normally happen */
    const currentName = parseSceneName(sceneText);
    const prefillText = buildSceneText(number, currentName);
    const result = await showPrompt('Rename Scene ' + number, prefillText, 'Rename');
    if(result === null) return; /* cancelled */
    let newName = result.trim();
    const prefixMatch = newName.match(new RegExp('^\\s*S#' + number + '\\s*-\\s*(.*)$'));
    if(prefixMatch) newName = prefixMatch[1].trim();
    const newText = buildSceneText(number, newName);
    if(newText === sceneText) return;
    pushUndoSnapshot();
    const changedIds = [];
    state.order.forEach(id => {
      if((state.cuts[id].scene || '').trim() === sceneText){
        state.cuts[id].scene = newText;
        changedIds.push(id);
      }
    });
    if(changedIds.length === 0) return;
    changedIds.forEach(id => saveCut(id));
    renderFilmstrip();
    renderScenesList();
  }

  function trashScene(sceneText){
    const affectedIds = state.order.filter(id => (state.cuts[id].scene || '').trim() === sceneText);
    if(affectedIds.length === 0) return;
    pushUndoSnapshot();
    const originalIndices = new Map(affectedIds.map(id => [id, state.order.indexOf(id)]));
    affectedIds.forEach(id => moveCutToTrash(id, originalIndices.get(id)));
    resortTrashOrder();
    saveOrder();
    saveTrashOrder();
    affectedIds.forEach(id => saveCut(id));
    renumberAllScenesSequentially();
    renderFilmstrip();
    renderScenesList();
    renderTrashProjectsList();
  }
  async function confirmTrashScene(sceneText){
    const ok = await showConfirm('Move all shots in scene "' + sceneText + '" to Trash?', 'Move to Trash');
    if(!ok) return;
    trashScene(sceneText);
    closeAllSceneMenus();
  }

  function buildSelectCircle(id){
    const circle = document.createElement('button');
    circle.className = 'select-circle' + (selectedIds.has(id) ? ' selected' : '');
    circle.innerHTML = ICONS.check;
    circle.addEventListener('click', e => { e.stopPropagation(); toggleCutSelection(id, circle); });
    return circle;
  }

  /* ===================== Batch actions on selected cuts ===================== */
  function trashSelectedCuts(){
    if(selectedIds.size === 0) return;
    pushUndoSnapshot();
    const ids = Array.from(selectedIds);
    const originalIndices = new Map(ids.map(id => [id, state.order.indexOf(id)]));
    ids.forEach(id => moveCutToTrash(id, originalIndices.get(id)));
    resortTrashOrder();
    saveOrder();
    saveTrashOrder();
    ids.forEach(id => saveCut(id));
    renumberAllScenesSequentially();
    exitSelectMode();
    renderFilmstrip();
    renderScenesList();
    renderTrashProjectsList();
  }
  function sortIdsByTrashOrder(ids){
    return ids.slice().sort((a, b) => {
      const ca = state.cuts[a], cb = state.cuts[b];
      const an = ca ? parseSceneNumber(ca.trashedScene) : null, bn = cb ? parseSceneNumber(cb.trashedScene) : null;
      const asn = an === null ? Infinity : an, bsn = bn === null ? Infinity : bn;
      if(asn !== bsn) return asn - bsn;
      const as = ca && ca.trashedShotNumber != null ? ca.trashedShotNumber : 0;
      const bs = cb && cb.trashedShotNumber != null ? cb.trashedShotNumber : 0;
      return as - bs;
    });
  }
  function finishPutBack(ids){
    resortOrderByScene();
    saveOrder();
    saveTrashOrder();
    ids.forEach(id => saveCut(id));
    exitSelectMode();
    renderFilmstrip();
    renderScenesList();
    renderTrashProjectsList();
    showToast(ids.length === 1 ? 'Shot restored' : ids.length + ' shots restored');
  }
  function clearTrashMeta(id){
    state.cuts[id].trashedScene = null;
    state.cuts[id].trashedShotNumber = null;
    state.cuts[id].trashedAt = null;
  }

  function openPutBackPicker(){
    if(selectedIds.size === 0) return;
    const groups = computeSceneGroups();
    const items = [
      { label: 'Beginning of Project', onClick: () => putBackAtEdge('start') },
      { label: 'End of Project', onClick: () => putBackAtEdge('end') }
    ];
    groups.forEach(g => {
      items.push({ label: 'Merge Into ' + g.scene, sublabel: g.count + (g.count === 1 ? ' shot' : ' shots'), onClick: () => putBackMergeIntoScene(g.scene) });
      items.push({ label: 'New Scene After ' + g.scene, sublabel: 'Independent scene', onClick: () => putBackAfterScene(g.scene) });
    });
    openGenericScenePicker('Put Back To…', items);
  }
  function putBackAtEdge(position){
    if(selectedIds.size === 0) return;
    pushUndoSnapshot();
    const ids = sortIdsByTrashOrder(Array.from(selectedIds));
    ids.forEach(id => { const idx = state.trashOrder.indexOf(id); if(idx !== -1) state.trashOrder.splice(idx, 1); });

    let newN;
    if(position === 'start'){
      newN = 1;
      const groups = computeSceneGroups();
      const mapping = new Map();
      groups.forEach(g => { const n = parseSceneNumber(g.scene); if(n !== null) mapping.set(g.scene, renumberScene(g.scene, n + 1)); });
      if(mapping.size > 0){
        state.order.forEach(id => {
          const cur = (state.cuts[id].scene || '').trim();
          if(mapping.has(cur)){
            const nt = mapping.get(cur);
            if(nt !== cur){ state.cuts[id].scene = nt; saveCut(id); }
          }
        });
      }
    } else {
      newN = getNextSceneNumber();
    }
    const sceneLabel = 'S#' + newN;
    ids.forEach(id => { state.cuts[id].scene = sceneLabel; clearTrashMeta(id); });
    state.order = position === 'start' ? ids.concat(state.order) : state.order.concat(ids);
    finishPutBack(ids);
  }
  function putBackAfterScene(afterScene){
    if(selectedIds.size === 0) return;
    const curNum = parseSceneNumber(afterScene);
    if(curNum === null) return;
    pushUndoSnapshot();
    const ids = sortIdsByTrashOrder(Array.from(selectedIds));
    ids.forEach(id => { const idx = state.trashOrder.indexOf(id); if(idx !== -1) state.trashOrder.splice(idx, 1); });

    const newN = curNum + 1;
    const groups = computeSceneGroups();
    const mapping = new Map();
    groups.forEach(g => { const n = parseSceneNumber(g.scene); if(n !== null && n >= newN) mapping.set(g.scene, renumberScene(g.scene, n + 1)); });
    if(mapping.size > 0){
      state.order.forEach(id => {
        const cur = (state.cuts[id].scene || '').trim();
        if(mapping.has(cur)){
          const nt = mapping.get(cur);
          if(nt !== cur){ state.cuts[id].scene = nt; saveCut(id); }
        }
      });
    }
    const sceneLabel = 'S#' + newN;
    ids.forEach(id => {
      state.cuts[id].scene = sceneLabel;
      clearTrashMeta(id);
      if(!state.order.includes(id)) state.order.push(id);
    });
    finishPutBack(ids);
  }
  function putBackMergeIntoScene(targetScene){
    if(selectedIds.size === 0) return;
    pushUndoSnapshot();
    const ids = sortIdsByTrashOrder(Array.from(selectedIds));
    ids.forEach(id => { const idx = state.trashOrder.indexOf(id); if(idx !== -1) state.trashOrder.splice(idx, 1); });
    ids.forEach(id => {
      state.cuts[id].scene = targetScene;
      clearTrashMeta(id);
      if(!state.order.includes(id)) state.order.push(id);
      moveCutToEndOfScene(id, targetScene);
    });
    finishPutBack(ids);
  }
  async function permanentlyDeleteCuts(ids){
    if(ids.length === 0) return;
    pushUndoSnapshot();
    ids.forEach(id => {
      const oIdx = state.order.indexOf(id);
      if(oIdx !== -1) state.order.splice(oIdx, 1);
      const tIdx = state.trashOrder.indexOf(id);
      if(tIdx !== -1) state.trashOrder.splice(tIdx, 1);
      delete state.cuts[id];

    saveOrder();
    saveTrashOrder();
    await Promise.all(ids.map(id => storDelete('project:' + currentProjectId + ':cut:' + id)));
    exitSelectMode();

    renderScenesList();

  function computeSceneGroups(){
    const map = new Map();
    state.order.forEach((id, idx) => {
      const scene = (state.cuts[id].scene || '').trim();
      if(!scene) return;
      if(!map.has(scene)) map.set(scene, { scene, firstIndex: idx, firstId: id, count: 1 });
      else map.get(scene).count++;
    });
    const groups = Array.from(map.values());
    groups.sort((a, b) => {
      const na = parseSceneNumber(a.scene), nb = parseSceneNumber(b.scene);
      if(na !== null && nb !== null) return na - nb;
      if(na !== null) return -1;
      if(nb !== null) return 1;
      return a.scene.localeCompare(b.scene);
    });
    return groups;
  }

  function renumberScene(oldText, newNumber){
    if(parseSceneNumber(oldText) === null) return oldText;
    return oldText.replace(/\d+/, String(newNumber));
  }

  function applySceneRenumbering(orderedSceneTexts){
    const mapping = new Map();
    orderedSceneTexts.forEach((oldText, i) => mapping.set(oldText, renumberScene(oldText, i + 1)));
    const changedIds = [];
    state.order.forEach(id => {
      const cur = (state.cuts[id].scene || '').trim();
      if(mapping.has(cur)){
        const newText = mapping.get(cur);
        if(newText !== cur){
          state.cuts[id].scene = newText;
          changedIds.push(id);
        }
      }
    });
    resortOrderByScene();
    saveOrder();
    changedIds.forEach(id => saveCut(id));
    renderFilmstrip();
    renderScenesList();
    return mapping;
  }

  function onSceneItemPointerDown(e, sceneText, firstId, itemEl, rowEl){
    if(e.pointerType === 'mouse' && e.button !== 0) return;
    const pointerId = e.pointerId;
    const startX = e.clientX, startY = e.clientY;
    let phase = 'idle'; /* idle -> longpress -> drag, or tap, or cancelled */

    const timer = setTimeout(() => {
      if(phase !== 'idle') return;
      phase = 'longpress';
      closeAllSceneMenus();
      rowEl.classList.add('menu-open');
      openSceneMenuId = sceneText;
      openSceneActionSheet(sceneText, rowEl);
    }, 420);

    function onMove(ev){
      if(ev.pointerId !== pointerId) return;
      const dist = Math.hypot(ev.clientX - startX, ev.clientY - startY);
      if(phase === 'idle' && dist > 10){
        phase = 'cancelled';
        clearTimeout(timer);
        cleanup();
      } else if(phase === 'longpress' && dist > 12){
        closeAllSceneMenus();
        phase = 'drag';
        cleanup();
        beginDrag();
      }
    }
    function onUp(ev){
      if(ev.pointerId !== pointerId) return;
      clearTimeout(timer);
      cleanup();
      if(phase === 'idle'){
        if(appMode === 'trash') exitTrashModeToMain();
        jumpToCut(firstId);
        closeSidebar();
      }
    }
    function cleanup(){
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);

    function beginDrag(){
      rowEl.classList.add('dragging');
      const scroller = document.querySelector('.sidebar-scroll');
      const startScrollTop = scroller ? scroller.scrollTop : 0;

      function computeTargetIndex(clientY){
        /* Re-query sibling rects on every call — caching them once at drag-start goes stale
           the moment autoscroll fires, which is what caused the reorder jitter. */
        const otherEntries = Array.from(sidebarListEl.querySelectorAll('.scene-row[data-scene]'))
          .filter(el => el.dataset.scene !== sceneText)
          .map(el => ({ scene: el.dataset.scene, rect: el.getBoundingClientRect() }));
        let count = 0;
        for(const o of otherEntries){
          const mid = o.rect.top + o.rect.height / 2;
          if(clientY > mid) count++;
        }
        return count;
      }
      let currentTarget = computeTargetIndex(startY);
      let scrollDir = 0, rafId = null;
      function autoScrollLoop(){
        if(scrollDir !== 0 && scroller) scroller.scrollTop += scrollDir * 12;
        rafId = requestAnimationFrame(autoScrollLoop);
      }
      rafId = requestAnimationFrame(autoScrollLoop);

      function onDragMove(ev){
        if(ev.pointerId !== pointerId) return;
        ev.preventDefault();
        /* The item stays in normal flow, so container autoscroll already moves it on its own;
           compensate the manual translate by that same scroll delta so it doesn't double-move
           and drift away from the finger. */
        const scrollDelta = scroller ? (scroller.scrollTop - startScrollTop) : 0;
        const dy = (ev.clientY - startY) + scrollDelta;
        rowEl.style.transform = 'translateY(' + dy + 'px) scale(1.02)';
        if(scroller){
          const contRect = scroller.getBoundingClientRect();
          const edge = 40;
          if(ev.clientY < contRect.top + edge) scrollDir = -1;
          else if(ev.clientY > contRect.bottom - edge) scrollDir = 1;
          else scrollDir = 0;
        }
        currentTarget = computeTargetIndex(ev.clientY);
      }
      function onDragUp(ev){
        if(ev.pointerId !== pointerId) return;
        document.removeEventListener('pointermove', onDragMove);
        document.removeEventListener('pointerup', onDragUp);
        scrollDir = 0;
        if(rafId) cancelAnimationFrame(rafId);
        rowEl.classList.remove('dragging');
        rowEl.style.transform = '';
        const visualOrderScenes = Array.from(sidebarListEl.querySelectorAll('.scene-row[data-scene]')).map(el => el.dataset.scene);
        const arr = visualOrderScenes.filter(s => s !== sceneText);
        arr.splice(currentTarget, 0, sceneText);
        pushUndoSnapshot();
        const mapping = applySceneRenumbering(arr);
        const newText = mapping.get(sceneText);
        requestAnimationFrame(() => flashRow(sidebarListEl.querySelector('.scene-row[data-scene="' + newText + '"]')));
      }
      document.addEventListener('pointermove', onDragMove);
      document.addEventListener('pointerup', onDragUp);
    }
  }

  /* ===================== Projects: sort + list + drag reorder ===================== */
  function sortedProjectsList(){
    if(projectSort.field === 'custom') return projects.slice();
    const arr = projects.slice();
    arr.sort((a, b) => {
      if(projectSort.field === 'title'){
        const cmp = (a.title || '').toLowerCase().localeCompare((b.title || '').toLowerCase());
        return projectSort.dir === 'asc' ? cmp : -cmp;
      }
      const av = (projectSort.field === 'created' ? a.createdAt : a.updatedAt) || 0;
      const bv = (projectSort.field === 'created' ? b.createdAt : b.updatedAt) || 0;
      return projectSort.dir === 'asc' ? (av - bv) : (bv - av);
    });
    return arr;
  }
  function setProjectSort(field){
    if(projectSort.field === field){
      projectSort.dir = projectSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      projectSort.field = field;
      projectSort.dir = field === 'title' ? 'asc' : 'desc';
    }
    renderProjectsList();
  }
  document.getElementById('projectSortBtn').addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('projectSortMenu').classList.toggle('open');
  });
  document.querySelectorAll('.sort-option').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      setProjectSort(btn.dataset.field);
      document.getElementById('projectSortMenu').classList.remove('open');
    });
  });

  function renderProjectsList(){
    projectsListEl.innerHTML = '';
    sortedProjectsList().forEach(p => {
      const row = document.createElement('div');
      row.className = 'project-row';
      row.dataset.projectId = p.id;

      const item = document.createElement('button');
      item.className = 'project-item' + (p.id === currentProjectId ? ' active' : '');
      item.innerHTML = ICONS.film + '<span class="project-item-title">' + escapeHtml(p.title || 'Untitled Storyboard') + '</span>';
      row.appendChild(item);

      const del = document.createElement('button');
      del.className = 'project-delete-chip';
      del.innerHTML = ICONS.trash + '<span>Delete</span>';
      del.addEventListener('click', e => { e.stopPropagation(); deleteProject(p.id); });
      row.appendChild(del);

      item.addEventListener('pointerdown', e => onProjectItemPointerDown(e, p.id, item, row));
      projectsListEl.appendChild(row);
    });
    const newItem = document.createElement('button');
    newItem.className = 'project-item new-project-item';
    newItem.innerHTML = ICONS.plus + '<span>New Project</span>';
    newItem.addEventListener('click', createNewProject);
    projectsListEl.appendChild(newItem);

    document.querySelectorAll('.sort-option').forEach(btn => {
      const isActive = projectSort.field === btn.dataset.field;
      btn.classList.toggle('active', isActive);
      btn.querySelector('.sort-dir').textContent = isActive ? (projectSort.dir === 'asc' ? '↑' : '↓') : '';
    });
    document.getElementById('projectSortBtn').classList.toggle('active', projectSort.field !== 'custom');
  }

  let openProjectMenuId = null;
  function closeAllProjectMenus(){
    projectsListEl.querySelectorAll('.project-row.menu-open').forEach(el => el.classList.remove('menu-open'));
    openProjectMenuId = null;
  }

  async function deleteProject(id){
    const proj = projects.find(p => p.id === id);
    const name = proj ? (proj.title || 'Untitled Storyboard') : 'this project';
    const ok = await showConfirm('Delete "' + name + '"? This cannot be undone.', 'Delete');
    if(!ok) return;
    closeAllProjectMenus();
    const data = await ensureProjectLoaded(id);
    if(data){
      const allCutIds = (data.order || []).concat(data.trashOrder || []);
      await Promise.all(allCutIds.map(cid => storDelete('project:' + id + ':cut:' + cid)));
    }
    await storDelete('project:' + id + ':order');
    await storDelete('project:' + id + ':trash');
    await storDelete('project:' + id + ':meta');
    delete projectDataCache[id];
    projects = projects.filter(p => p.id !== id);
    await saveProjectsIndex();
    if(currentProjectId === id){
      if(projects.length > 0){
        currentProjectId = projects[0].id;
        await storSet('active-project', currentProjectId);
        state = await ensureProjectLoaded(currentProjectId);
        appMode = 'main';
        resortOrderByScene();
        saveOrder();
        sceneEditedIds.clear();
        exitSelectMode();
        resetUndoHistory();
        setViewMode('basic');
        syncModeUI();
      } else {
        createNewProject();
        return;
      }
    }
    renderSidebar();
  }

  function onProjectItemPointerDown(e, id, itemEl, rowEl){
    if(e.pointerType === 'mouse' && e.button !== 0) return;
    const pointerId = e.pointerId;
    const startX = e.clientX, startY = e.clientY;
    let phase = 'idle'; /* idle -> longpress (reveals the delete chip), or cancelled by movement, or a tap */

    const timer = setTimeout(() => {
      if(phase !== 'idle') return;
      phase = 'longpress';
      closeAllProjectMenus();
      rowEl.classList.add('menu-open');
      openProjectMenuId = id;
    }, 420);

    function onMove(ev){
      if(ev.pointerId !== pointerId) return;
      const dist = Math.hypot(ev.clientX - startX, ev.clientY - startY);
      if(phase === 'idle' && dist > 10){
        phase = 'cancelled';
        clearTimeout(timer);
        cleanup();
      }
    }
    function onUp(ev){
      if(ev.pointerId !== pointerId) return;
      clearTimeout(timer);
      cleanup();
      if(phase === 'idle') switchProject(id);
    }
    function cleanup(){
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  }

  function renderSidebar(){
    renderProjectsList();
    renderScenesList();
    renderTrashProjectsList();
  }

  async function switchProject(id){
    const modeChanging = appMode !== 'main';
    const projectChanging = id !== currentProjectId;
    if(!projectChanging && !modeChanging){ closeSidebar(); return; }
    currentProjectId = id;
    storSet('active-project', id);
    state = await ensureProjectLoaded(id);
    appMode = 'main';
    resortOrderByScene();
    saveOrder();
    sceneEditedIds.clear();
    exitSelectMode();
    if(projectChanging) resetUndoHistory();
    setViewMode('basic');
    syncModeUI();
    renderSidebar();
    closeSidebar();
  }

  function createNewProject(){
    const now = Date.now();
    const id = uid('p');
    projects.push({ id, title: 'Untitled Storyboard', createdAt: now, updatedAt: now });
    saveProjectsIndex();
    const data = { title: 'Untitled Storyboard', order: [], trashOrder: [], cuts: {} };
    for(let i = 0; i < 10; i++){
      const cid = uid('c');
      data.cuts[cid] = { id: cid, scene: 'S#1', notes: '', image: null };
      data.order.push(cid);
    }
    projectDataCache[id] = data;
    saveOrderFor(id, data.order);
    data.order.forEach(cid => saveCutFor(id, cid, data.cuts[cid]));
    saveMetaFor(id, data.title);
    currentProjectId = id;
    storSet('active-project', id);
    state = data;
    appMode = 'main';
    sceneEditedIds.clear();
    exitSelectMode();
    resetUndoHistory();
    setViewMode('basic');
    syncModeUI();
    renderSidebar();
    closeSidebar();
  }

  /* ===================== Backup: export / import ===================== */
  async function gatherFullBackup(){
    /* A backup must include every project, even ones the background preload hasn't reached yet. */
    await Promise.all(projects.map(p => ensureProjectLoaded(p.id)));
    return {
      app: 'ipad-storyboard',
      exportedAt: new Date().toISOString(),
      projects: JSON.parse(JSON.stringify(projects)),
      projectData: JSON.parse(JSON.stringify(projectDataCache))
    };
  }

  document.getElementById('exportBtn').addEventListener('click', async () => {
    try{
      const bundle = await gatherFullBackup();
      const stamp = new Date().toISOString().slice(0, 10);
      const filename = 'storyboard-backup-' + stamp + '.json';
      const blob = new Blob([JSON.stringify(bundle)], { type: 'application/json' });

      if(navigator.canShare && navigator.share){
        const file = new File([blob], filename, { type: 'application/json' });
        if(navigator.canShare({ files: [file] })){
          try{
            await navigator.share({ files: [file], title: filename });
            return;
          }catch(shareErr){
            if(shareErr && shareErr.name === 'AbortError') return;
            /* fall through to plain download */
          }
        }
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 4000);
      showToast('Backup saved to Downloads');
    }catch(err){
      showToast('Could not create a backup file');
    }
  });

  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importInput').click();
  });
  document.getElementById('importInput').addEventListener('change', async e => {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if(!file) return;
    try{
      const text = await file.text();
      const bundle = JSON.parse(text);
      if(!bundle || !Array.isArray(bundle.projects) || !bundle.projectData){
        showToast("That file doesn't look like a valid backup");
        return;
      }
      const ok = await showConfirm("This replaces everything currently in the app with this backup. This can't be undone.", 'Restore');
      if(!ok) return;
      for(const p of bundle.projects){
        const data = bundle.projectData[p.id];
        if(!data) continue;
        await saveMetaFor(p.id, data.title || p.title);
        await saveOrderFor(p.id, data.order || []);
        await saveTrashOrderFor(p.id, data.trashOrder || []);
        const cuts = data.cuts || {};
        await Promise.all(Object.keys(cuts).map(cid => saveCutFor(p.id, cid, cuts[cid])));
        projectDataCache[p.id] = { title: data.title || p.title, order: data.order || [], trashOrder: data.trashOrder || [], cuts: cuts };
      }
      projects = bundle.projects;
      await saveProjectsIndex();
      currentProjectId = projects.length ? projects[0].id : null;
      appMode = 'main';
      exitSelectMode();
      resetUndoHistory();
      if(currentProjectId){
        await storSet('active-project', currentProjectId);
        state = projectDataCache[currentProjectId];
        syncModeUI();
      }
      renderFilmstrip();
      renderSidebar();
      showToast('Backup restored');
    }catch(err){
      showToast("Couldn't read that backup file");
    }
  });

  /* ===================== Shared canvas drawing helpers ===================== */
  function renderFrameCanvas(ctx, baseImage, strokes, transform){
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.globalCompositeOperation = 'source-over';
    if(baseImage){
      const t = transform || { scale: 1, offsetX: 0, offsetY: 0 };
      const fitScale = Math.min(CANVAS_W / baseImage.width, CANVAS_H / baseImage.height);
      const scale = fitScale * t.scale;
      const w = baseImage.width * scale, h = baseImage.height * scale;
      const x = (CANVAS_W - w) / 2 + t.offsetX, y = (CANVAS_H - h) / 2 + t.offsetY;
      ctx.drawImage(baseImage, x, y, w, h);
    }
    strokes.forEach(s => drawStroke(ctx, s));
    ctx.globalCompositeOperation = 'source-over';
  }

  function flattenToDataURL(ctx, baseImage, strokes, transform){
    const canvas = ctx.canvas;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.globalCompositeOperation = 'source-over';
    /* No white fillRect here: baking an opaque background over the *entire* canvas is what
       made the guide lines disappear the moment this got reloaded as baseImage elsewhere —
       the flattened image, being opaque everywhere, sat in front of the guide divs and hid
       them even in empty areas that were never actually drawn on. PNG keeps true transparency
       so only the actually-drawn pixels (strokes / pasted photo) cover the guides. */
    if(baseImage){
      const t = transform || { scale: 1, offsetX: 0, offsetY: 0 };
      const fitScale = Math.min(canvas.width / baseImage.width, canvas.height / baseImage.height);
      const scale = fitScale * t.scale;
      const w = baseImage.width * scale, h = baseImage.height * scale;
      const x = (canvas.width - w) / 2 + t.offsetX, y = (canvas.height - h) / 2 + t.offsetY;
      ctx.drawImage(baseImage, x, y, w, h);
    }
    strokes.forEach(s => drawStroke(ctx, s));
    const url = canvas.toDataURL('image/png');
    renderFrameCanvas(ctx, baseImage, strokes, transform);
    return url;
  }

  function drawStroke(ctx, stroke){
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalCompositeOperation = stroke.mode === 'eraser' ? 'destination-out' : 'source-over';
    ctx.strokeStyle = stroke.mode === 'eraser' ? 'rgba(0,0,0,1)' : stroke.color;
    ctx.fillStyle = stroke.mode === 'eraser' ? 'rgba(0,0,0,1)' : stroke.color;
    const pts = stroke.points;
    if(pts.length < 2){
      const p = pts[0];
      if(p){ ctx.beginPath(); ctx.arc(p.x, p.y, stroke.size / 2, 0, Math.PI * 2); ctx.fill(); }
      ctx.restore();
      return;
    }
    if(pts.length === 2){
      const a = pts[0], b = pts[1];
      ctx.lineWidth = stroke.size * (0.5 + 0.5 * (b.pressure == null ? 0.5 : b.pressure));
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      ctx.restore();
      return;
    }
    /* Quadratic-curve-through-midpoints: instead of straight lineTo segments between raw
       samples (which looks like a jagged polygon at normal sampling rates), curve through
       the midpoint of each consecutive pair, using the actual sampled point as the control
       point. This is the standard technique native drawing apps use for natural-looking
       freehand strokes. Each segment is still stroked separately so pressure-based width
       variation per point is preserved. */
    for(let i = 1; i < pts.length - 1; i++){
      const cur = pts[i], next = pts[i + 1];
      const midX = (cur.x + next.x) / 2, midY = (cur.y + next.y) / 2;
      const prevMid = i === 1 ? pts[0] : { x: (pts[i - 1].x + cur.x) / 2, y: (pts[i - 1].y + cur.y) / 2 };
      ctx.lineWidth = stroke.size * (0.5 + 0.5 * (cur.pressure == null ? 0.5 : cur.pressure));
      ctx.beginPath();
      ctx.moveTo(prevMid.x, prevMid.y);
      ctx.quadraticCurveTo(cur.x, cur.y, midX, midY);
      ctx.stroke();
    }
    const last = pts[pts.length - 1];
    const secondLast = pts[pts.length - 2];
    const lastMid = { x: (secondLast.x + last.x) / 2, y: (secondLast.y + last.y) / 2 };
    ctx.lineWidth = stroke.size * (0.5 + 0.5 * (last.pressure == null ? 0.5 : last.pressure));
    ctx.beginPath();
    ctx.moveTo(lastMid.x, lastMid.y);
    ctx.lineTo(last.x, last.y);
    ctx.stroke();
    ctx.restore();
  }

  function toLocalPoint(canvas, e){
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (CANVAS_W / rect.width);
    const y = (e.clientY - rect.top) * (CANVAS_H / rect.height);
    const pressure = (e.pressure && e.pressure > 0) ? e.pressure : 0.5;
    return { x, y, pressure };
  }

  /* ===================== Inline (on-card) Apple Pencil drawing ===================== */
  function setupInlineCanvas(canvas, cut, unit, hintEl){
    const ctx = canvas.getContext('2d');
    canvas.width = CANVAS_W;
    canvas.height = CANVAS_H;
    const rec = { ctx, baseImage: null, strokes: [] };
    unit._inline = rec;
    unit._hintEl = hintEl;

    if(cut.image){
      hintEl.style.display = 'none';
      const img = new Image();
      img.onload = () => { rec.baseImage = img; renderFrameCanvas(ctx, rec.baseImage, rec.strokes); };
      img.src = cut.image;
    } else {
      renderFrameCanvas(ctx, rec.baseImage, rec.strokes);
    }

    let drawing = false, stroke = null;
    let tap = false, tapId = null, tapX = 0, tapY = 0, tapT = 0;

    canvas.addEventListener('pointerdown', e => {
      if(!editMode || appMode === 'trash') return;
      if(selectMode) return; /* let the tap bubble up as a click and toggle card selection instead */
      if(e.pointerType === 'pen'){
        e.preventDefault();
        canvas.setPointerCapture(e.pointerId);
        drawing = true;
        hintEl.style.display = 'none';
        const p = toLocalPoint(canvas, e);
        stroke = { mode: 'pen', color: INLINE_PEN_COLOR, size: INLINE_PEN_SIZE, points: [p] };
        rec.strokes.push(stroke);
        renderFrameCanvas(ctx, rec.baseImage, rec.strokes);
      } else {
        tap = true; tapId = e.pointerId; tapX = e.clientX; tapY = e.clientY; tapT = Date.now();
      }
    });
    canvas.addEventListener('pointermove', e => {
      if(drawing && e.pointerType === 'pen'){
        e.preventDefault();
        const p = toLocalPoint(canvas, e);
        stroke.points.push(p);
        renderFrameCanvas(ctx, rec.baseImage, rec.strokes);
      } else if(tap && e.pointerId === tapId){
        if(Math.hypot(e.clientX - tapX, e.clientY - tapY) > 8) tap = false;
      }
    });
    function finishDraw(){
      if(!drawing) return;
      drawing = false;
      const hasContent = rec.baseImage || rec.strokes.some(s => s.points.length > 0);
      cut.image = hasContent ? flattenToDataURL(ctx, rec.baseImage, rec.strokes) : null;
      /* This bypasses the fullscreen editor, so any live stroke data cached from a previous
         editor session no longer matches cut.image — drop it so the next time the editor
         opens it falls back to loading the flattened image fresh instead of showing stale,
         now-inaccurate strokes. */
      cut.editorStrokes = null;
      cut.editorPhoto = null;
      cut.editorActions = null;
      cut.editorRedoActions = null;
      saveCut(cut.id);
      stroke = null;
    }
    canvas.addEventListener('pointerup', e => {
      if(drawing){ finishDraw(); return; }
      if(tap && e.pointerId === tapId){
        const dt = Date.now() - tapT;
        tap = false;
        if(dt < 500) openEditor(cut.id);
      }
    });
    canvas.addEventListener('pointercancel', () => { if(drawing) finishDraw(); tap = false; });
  }

  function reloadInlineCanvas(unit){
    const rec = unit._inline;
    if(!rec) return;
    const cut = state.cuts[unit.dataset.unitId];
    if(!cut) return;
    rec.strokes = [];
    if(cut.image){
      const img = new Image();
      img.onload = () => { rec.baseImage = img; renderFrameCanvas(rec.ctx, rec.baseImage, rec.strokes); };
      img.src = cut.image;
      unit._hintEl.style.display = 'none';
    } else {
      rec.baseImage = null;
      renderFrameCanvas(rec.ctx, rec.baseImage, rec.strokes);
      unit._hintEl.style.display = 'flex';
    }
  }

  /* ===================== Fullscreen editor ===================== */
  const editorModal = document.getElementById('editorModal');
  const editorCanvas = document.getElementById('editorCanvas');
  const ectx = editorCanvas.getContext('2d');
  const editorCutNumEl = document.getElementById('editorCutNum');
  const editorEmptyHint = document.getElementById('editorEmptyHint');
  const fileInput = document.getElementById('fileInput');
  const canvasWrap = document.querySelector('.editor-canvas-wrap');
  const eraserTypeToggle = document.getElementById('eraserTypeToggle');

  editorCanvas.width = CANVAS_W;
  editorCanvas.height = CANVAS_H;

  const editorState = { cutId: null, baseImage: null, photoDataURL: null, strokes: [], actions: [], redoActions: [], tool: 'pen', color: '#221F1C', size: 8, photoTransform: { scale: 1, offsetX: 0, offsetY: 0 } };
  let editorEraserType = 'object'; /* 'object' | 'pixel' */
  let drawing = false, currentStroke = null, eraseSessionRemovals = null;
  let movePointers = new Map(); /* pointerId -> {x,y} local canvas point, active while tool==='move' */
  let moveGestureStart = null;  /* snapshot of photoTransform + pointer positions at gesture start, for pan/pinch delta math */

  function openEditor(cutId){
    if(!editMode) return;
    const cut = state.cuts[cutId];
    if(!cut) return;
    editorState.cutId = cutId;
    editorState.baseImage = null;
    editorState.photoDataURL = null;
    editorState.strokes = [];
    editorState.tool = 'pen';
    editorState.color = '#221F1C';
    editorState.photoTransform = cut.editorPhotoTransform ? JSON.parse(JSON.stringify(cut.editorPhotoTransform)) : { scale: 1, offsetX: 0, offsetY: 0 };
    movePointers.clear();
    moveGestureStart = null;
    setActiveToolUI();

    /* Undo/redo history is restored right alongside the strokes themselves — otherwise the
       first thing anyone does after reopening (erase, then hit Undo) looks broken, since there'd
       be no record of anything to undo even though the drawing is sitting right there. */
    editorState.actions = Array.isArray(cut.editorActions) ? JSON.parse(JSON.stringify(cut.editorActions)) : [];
    editorState.redoActions = Array.isArray(cut.editorRedoActions) ? JSON.parse(JSON.stringify(cut.editorRedoActions)) : [];
    updateEditorUndoRedoButtons();

    const idx = state.order.indexOf(cutId);
    editorCutNumEl.textContent = String(idx + 1).padStart(2, '0');

    editorModal.classList.add('open');

    /* editorStrokes/editorPhoto hold the still-editable, un-flattened drawing from the last
       time THIS cut was edited in the fullscreen editor — restoring them (instead of just
       reloading the flattened cut.image as an opaque picture) is what lets the object eraser
       keep working after closing and reopening. They're invalidated (see finishDraw) whenever
       inline card drawing changes cut.image behind the editor's back, in which case we fall
       back to the flattened image same as before. */
    const restoreStrokes = Array.isArray(cut.editorStrokes) ? JSON.parse(JSON.stringify(cut.editorStrokes)) : null;
    if(cut.editorPhoto){
      editorEmptyHint.style.display = 'none';
      editorState.photoDataURL = cut.editorPhoto;
      const img = new Image();
      img.onload = () => { editorState.baseImage = img; if(restoreStrokes) editorState.strokes = restoreStrokes; redrawEditor(); };
      img.onerror = () => { if(restoreStrokes) editorState.strokes = restoreStrokes; redrawEditor(); };
      img.src = cut.editorPhoto;
    } else if(restoreStrokes && restoreStrokes.length > 0){
      editorState.strokes = restoreStrokes;
      editorEmptyHint.style.display = 'none';
      redrawEditor();
    } else if(cut.image){
      /* No live stroke data available for this cut — fall back to the flattened image as a
         flat background (object eraser has nothing to pick apart in this case). */
      editorEmptyHint.style.display = 'none';
      const img = new Image();
      img.onload = () => { editorState.baseImage = img; redrawEditor(); };
      img.onerror = () => { redrawEditor(); };
      img.src = cut.image;
    } else {
      redrawEditor();
      editorEmptyHint.style.display = 'flex';
    }
    editorModal.focus({ preventScroll: true });
  }

  function redrawEditor(){
    renderFrameCanvas(ectx, editorState.baseImage, editorState.strokes, editorState.photoTransform);
  }

  function refreshTileImage(id){
    const tile = filmstripEl.querySelector('.tile[data-unit-id="' + id + '"]');
    if(!tile) return;
    const cut = state.cuts[id];
    tile.querySelectorAll('img, .tile-hint').forEach(el => el.remove());
    /* Insert after the guides (not as firstChild) so guides stay behind the image, matching buildTile. */
    const badge = tile.querySelector('.tile-badge');
    if(cut.image){
      const img = document.createElement('img');
      img.src = cut.image;
      tile.insertBefore(img, badge);
    } else {
      const hint = document.createElement('div');
      hint.className = 'tile-hint';
      hint.innerHTML = ICONS.pencil;
      tile.insertBefore(hint, badge);
    }
  }

  function closeEditor(commit){
    if(commit && editorState.cutId){
      const cut = state.cuts[editorState.cutId];
      if(cut){
        const hasContent = editorState.baseImage || editorState.strokes.length > 0;
        cut.image = hasContent ? flattenToDataURL(ectx, editorState.baseImage, editorState.strokes, editorState.photoTransform) : null;
        /* Keep the live, still-editable drawing data around (separate from the flattened
           cut.image) so reopening the editor can restore individual strokes instead of one
           opaque picture — that's what object eraser needs to keep working. */
        cut.editorPhoto = editorState.photoDataURL || null;
        cut.editorPhotoTransform = editorState.photoDataURL ? JSON.parse(JSON.stringify(editorState.photoTransform)) : null;
        cut.editorStrokes = JSON.parse(JSON.stringify(editorState.strokes));
        cut.editorActions = JSON.parse(JSON.stringify(editorState.actions));
        cut.editorRedoActions = JSON.parse(JSON.stringify(editorState.redoActions));
        saveCut(cut.id);
        if(viewMode === 'tile'){
          refreshTileImage(cut.id);
        } else {
          const unit = filmstripEl.querySelector('.cut-unit[data-unit-id="' + cut.id + '"]');
          if(unit) reloadInlineCanvas(unit);
        }
      }
    }
    editorModal.classList.remove('open');
    editorState.cutId = null;
  }
  document.getElementById('editorCloseBtn').addEventListener('click', () => closeEditor(true));

  function pointToSegmentDist(px, py, x1, y1, x2, y2){
    const dx = x2 - x1, dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    let t = lenSq === 0 ? 0 : ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    const cx = x1 + t * dx, cy = y1 + t * dy;
    return Math.hypot(px - cx, py - cy);
  }
  function strokeHitTest(stroke, x, y, tolerance){
    const pts = stroke.points;
    const margin = tolerance + stroke.size / 2;
    if(pts.length < 2){
      const p = pts[0];
      return !!p && Math.hypot(x - p.x, y - p.y) <= margin;
    }
    for(let i = 1; i < pts.length; i++){
      if(pointToSegmentDist(x, y, pts[i - 1].x, pts[i - 1].y, pts[i].x, pts[i].y) <= margin) return true;
    }
    return false;
  }
  function eraseObjectsAt(x, y){
    const tolerance = editorState.size;
    const remaining = [];
    let removedAny = false;
    editorState.strokes.forEach((s, idx) => {
      /* Eraser strokes are erasing actions, not drawn "objects" — they must never themselves
         be treated as a hit target, or object-erasing near a spot you previously pixel-erased
         would remove that erase stroke and bring the erased ink back. */
      if(s.mode !== 'eraser' && strokeHitTest(s, x, y, tolerance)){
        eraseSessionRemovals.push({ strokeId: s.id, strokeData: s, index: idx });
        removedAny = true;
      } else {
        remaining.push(s);
      }
    });
    if(removedAny){
      editorState.strokes = remaining;
      redrawEditor();
    }
  }

  editorCanvas.addEventListener('pointerdown', e => {
    editorCanvas.setPointerCapture(e.pointerId);
    if(editorState.tool === 'move'){
      if(!editorState.baseImage) return;
      const p = toLocalPoint(editorCanvas, e);
      movePointers.set(e.pointerId, p);
      if(movePointers.size === 1){
        moveGestureStart = {
          offsetX: editorState.photoTransform.offsetX, offsetY: editorState.photoTransform.offsetY,
          scale: editorState.photoTransform.scale, anchor: p
        };
      } else if(movePointers.size === 2){
        const pts = Array.from(movePointers.values());
        moveGestureStart = {
          offsetX: editorState.photoTransform.offsetX, offsetY: editorState.photoTransform.offsetY,
          scale: editorState.photoTransform.scale,
          dist: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y),
          midX: (pts[0].x + pts[1].x) / 2, midY: (pts[0].y + pts[1].y) / 2
        };
      }
      return;
    }
    drawing = true;
    editorEmptyHint.style.display = 'none';
    const p = toLocalPoint(editorCanvas, e);
    if(editorState.tool === 'eraser' && editorEraserType === 'object'){
      currentStroke = null;
      eraseSessionRemovals = [];
      eraseObjectsAt(p.x, p.y);
    } else {
      currentStroke = { id: uid('s'), mode: editorState.tool, color: editorState.color, size: editorState.size, points: [p] };
      editorState.strokes.push(currentStroke);
      editorState.actions.push({ type: 'add', strokeId: currentStroke.id, strokeData: currentStroke });
      editorState.redoActions = [];
      updateEditorUndoRedoButtons();
      redrawEditor();
    }
  });
  editorCanvas.addEventListener('pointermove', e => {
    if(editorState.tool === 'move'){
      if(!movePointers.has(e.pointerId) || !moveGestureStart) return;
      movePointers.set(e.pointerId, toLocalPoint(editorCanvas, e));
      if(movePointers.size === 1){
        const p = movePointers.get(e.pointerId);
        editorState.photoTransform.offsetX = moveGestureStart.offsetX + (p.x - moveGestureStart.anchor.x);
        editorState.photoTransform.offsetY = moveGestureStart.offsetY + (p.y - moveGestureStart.anchor.y);
        redrawEditor();
      } else if(movePointers.size === 2){
        const pts = Array.from(movePointers.values());
        const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        const midX = (pts[0].x + pts[1].x) / 2, midY = (pts[0].y + pts[1].y) / 2;
        const scaleFactor = moveGestureStart.dist > 0 ? dist / moveGestureStart.dist : 1;
        editorState.photoTransform.scale = Math.max(0.2, Math.min(6, moveGestureStart.scale * scaleFactor));
        editorState.photoTransform.offsetX = moveGestureStart.offsetX + (midX - moveGestureStart.midX);
        editorState.photoTransform.offsetY = moveGestureStart.offsetY + (midY - moveGestureStart.midY);
        redrawEditor();
      }
      return;
    }
    if(!drawing) return;
    const p = toLocalPoint(editorCanvas, e);
    if(editorState.tool === 'eraser' && editorEraserType === 'object'){
      eraseObjectsAt(p.x, p.y);
    } else if(currentStroke){
      currentStroke.points.push(p);
      redrawEditor();
    }
  });
  function endStroke(e){
    if(editorState.tool === 'move'){
      if(e && e.pointerId != null) movePointers.delete(e.pointerId);
      if(movePointers.size === 1){
        const remaining = Array.from(movePointers.entries())[0];
        moveGestureStart = {
          offsetX: editorState.photoTransform.offsetX, offsetY: editorState.photoTransform.offsetY,
          scale: editorState.photoTransform.scale, anchor: remaining[1]
        };
      } else if(movePointers.size === 0){
        moveGestureStart = null;
      }
      return;
    }
    if(!drawing) return;
    drawing = false;
    /* A whole object-erase drag (from touch-down to lift-off) commits as a single undo step,
       the same granularity a single pen stroke gets — one Undo click restores everything that
       particular drag erased, rather than needing one click per object it happened to cross. */
    if(eraseSessionRemovals && eraseSessionRemovals.length > 0){
      editorState.actions.push({ type: 'erase', removed: eraseSessionRemovals });
      editorState.redoActions = [];
      updateEditorUndoRedoButtons();
    }
    eraseSessionRemovals = null;
    currentStroke = null;
  }
  editorCanvas.addEventListener('pointerup', endStroke);
  editorCanvas.addEventListener('pointercancel', endStroke);

  document.querySelectorAll('.eraser-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      editorEraserType = btn.dataset.eraserType;
      editorState.tool = 'eraser';
      setActiveToolUI();
    });
  });

  function setActiveToolUI(){
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === editorState.tool));
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('active', s.dataset.color === editorState.color && editorState.tool === 'pen'));
    document.querySelectorAll('.size-dot').forEach(d => d.classList.toggle('active', Number(d.dataset.size) === editorState.size));
    document.querySelectorAll('.eraser-type-btn').forEach(b => b.classList.toggle('active', editorState.tool === 'eraser' && b.dataset.eraserType === editorEraserType));
    eraserTypeToggle.classList.toggle('tool-active', editorState.tool === 'eraser');
  }
  function updateEditorUndoRedoButtons(){
    document.getElementById('undoBtn').classList.toggle('disabled', editorState.actions.length === 0);
    document.getElementById('redoBtn').classList.toggle('disabled', editorState.redoActions.length === 0);
  }
  document.querySelectorAll('.tool-btn').forEach(btn => {
    btn.addEventListener('click', () => { editorState.tool = btn.dataset.tool; setActiveToolUI(); });
  });
  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('click', () => { editorState.color = sw.dataset.color; editorState.tool = 'pen'; setActiveToolUI(); });
  });
  document.querySelectorAll('.size-dot').forEach(dot => {
    dot.addEventListener('click', () => { editorState.size = Number(dot.dataset.size); setActiveToolUI(); });
  });
  document.getElementById('undoBtn').addEventListener('click', () => {
    if(editorState.actions.length === 0) return;
    const action = editorState.actions.pop();
    if(action.type === 'add'){
      const idx = editorState.strokes.findIndex(s => s.id === action.strokeId);
      if(idx !== -1) editorState.strokes.splice(idx, 1);
    } else if(action.type === 'erase'){
      /* Reinsert in reverse removal order, each at the index it had at the moment it was
         removed — that exactly undoes the sequence of removals from that one drag gesture. */
      for(let i = action.removed.length - 1; i >= 0; i--){
        const { strokeData, index } = action.removed[i];
        editorState.strokes.splice(index, 0, strokeData);
      }
    }
    editorState.redoActions.push(action);
    updateEditorUndoRedoButtons();
    redrawEditor();
  });
  document.getElementById('redoBtn').addEventListener('click', () => {
    if(editorState.redoActions.length === 0) return;
    const action = editorState.redoActions.pop();
    if(action.type === 'add'){
      editorState.strokes.push(action.strokeData);
    } else if(action.type === 'erase'){
      action.removed.forEach(({ strokeId }) => {
        const idx = editorState.strokes.findIndex(s => s.id === strokeId);
        if(idx !== -1) editorState.strokes.splice(idx, 1);
      });
    }
    editorState.actions.push(action);
    updateEditorUndoRedoButtons();
    redrawEditor();
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    editorState.strokes = [];
    editorState.actions = [];
    editorState.redoActions = [];
    updateEditorUndoRedoButtons();
    redrawEditor();
  });


  document.getElementById('choosePhotoBtn').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if(file) loadImageBlobIntoEditor(file);
    fileInput.value = '';
  });

  document.getElementById('pasteBtn').addEventListener('click', async () => {
    try{
      if(!navigator.clipboard || !navigator.clipboard.read) throw new Error('unsupported');
      const items = await navigator.clipboard.read();
      let found = false;
      for(const item of items){
        const type = item.types.find(t => t.startsWith('image/'));
        if(type){
          const blob = await item.getType(type);
          loadImageBlobIntoEditor(blob);
          found = true;
          break;
        }
      }
      if(!found) showToast('No image found on the clipboard');
    }catch(err){
      showToast("Paste isn't available here — try Photo instead");
    }
  });

  document.addEventListener('paste', e => {
    if(!editorModal.classList.contains('open')) return;
    const items = e.clipboardData && e.clipboardData.items;
    if(!items) return;
    for(const item of items){
      if(item.type && item.type.indexOf('image/') === 0){
        e.preventDefault();
        const blob = item.getAsFile();
        if(blob) loadImageBlobIntoEditor(blob);
        return;
      }
    }
  });

  canvasWrap.addEventListener('dragover', e => e.preventDefault());
  canvasWrap.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if(file && file.type.indexOf('image/') === 0) loadImageBlobIntoEditor(file);
  });

  function loadImageBlobIntoEditor(blob){
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      editorState.baseImage = img;
      editorEmptyHint.style.display = 'none';
      redrawEditor();
      URL.revokeObjectURL(url);
    };
    img.onerror = () => { showToast("Couldn't load that image"); URL.revokeObjectURL(url); };
    img.src = url;

    /* blob: URLs are ephemeral (scoped to this page load) and can't be persisted, so also
       capture a real data URL here for saving as cut.editorPhoto on close. */
    const reader = new FileReader();
    reader.onload = () => { editorState.photoDataURL = reader.result; };
    reader.readAsDataURL(blob);
  }

  /* ===================== Boot ===================== */
  async function boot(){
    await loadProjectsIndex();
    /* Load only the active project so we can render right away; everything else loads in the background. */
    state = await ensureProjectLoaded(currentProjectId);
    appMode = 'main';
    resortOrderByScene();
    saveOrder();
    setEditMode(false);
    syncModeUI();
    updateUndoRedoButtons();
    renderFilmstrip();
    renderSidebar();
    preloadRemainingProjects();
  }
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW registration failed:', err));
    });
  }

  boot();

})();
</script>
</body>
</html>
