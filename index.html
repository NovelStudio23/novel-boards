<style>
  :root{
    --bg: #3C3C40;
    --bg-deep: #2C2C2F;
    --bg-well: #333336;
    --bg-elevated: #45454A;
    --bg-elevated-2: #505056;
    --line: rgba(255,255,255,0.10);
    --line-strong: rgba(255,255,255,0.20);
    --text: #F0F0F1;
    --text-dim: #ADADB3;
    --text-faint: #7C7C82;
    --paper: #FFFFFF;
    --paper-line: #E2E2E4;
    --ink: #222225;
    --ink-dim: #77777C;
    --frame-border: #2B2B2E;
    --frame-guide: #C7C7CC;
    --accent: #E0502A;
    --accent-dim: #7A3020;
    --accent-soft: rgba(224,80,42,0.16);
    --danger: #D64545;
    --font-display: 'Avenir Next', 'Helvetica Neue', Arial, sans-serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    --font-mono: 'SF Mono', Menlo, ui-monospace, Consolas, monospace;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }
  .note-line, #projectTitle{ -webkit-user-select:text; user-select:text; -webkit-touch-callout:default; }
  html,body{ margin:0; height:100%; overflow:hidden; overscroll-behavior:none; background:var(--bg); }
  body{ font-family:var(--font-body); color:var(--text); }
  button, input, textarea{ font-family:inherit; color:inherit; }
  button{ appearance:none; -webkit-appearance:none; background:none; border:none; padding:0; cursor:pointer; transition:transform .12s ease, opacity .12s ease, background .15s ease, border-color .15s ease; }
  button:active{ transform:scale(.95); }
  svg{ display:block; }

  button:focus-visible, textarea:focus-visible, input:focus-visible, [contenteditable]:focus-visible{
    outline:2px solid var(--accent); outline-offset:2px; border-radius:4px;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; transition-duration:.001ms !important; }
  }

  .backdrop{ position:absolute; inset:0; background:rgba(0,0,0,.42); opacity:0; pointer-events:none; transition:opacity .32s ease; z-index:35; }

  /* ---------- Stage / filmstrip ---------- */
  .stage{ flex:1 1 auto; min-width:0; display:flex; flex-direction:column; }
  .sprockets, .sprockets-bottom{
    height:13px; flex:0 0 auto; background:var(--bg-elevated);

    background-size:22px 100%; background-position:11px center;
  }
  .sprockets{ border-bottom:1px solid var(--line); }
  .sprockets-bottom{ border-top:1px solid var(--line); }

  .filmstrip{
    flex:1 1 auto; min-height:0; display:flex; align-items:stretch;
    overflow-x:auto; overflow-y:hidden;
    padding:20px 8px 22px;
    background:var(--bg-well);

  }
  body.view-mode .filmstrip{ padding:0; box-shadow:none; }

  @media (orientation: portrait){

  }

  .filmstrip.tile-mode{
    display:grid; grid-auto-flow:column; grid-template-rows:repeat(4, auto);
    grid-auto-columns:185px; gap:10px; align-content:center; justify-content:start;
    overflow-x:auto; overflow-y:hidden; padding:16px;
  }
  @media (orientation: portrait){
    .filmstrip.tile-mode{
      grid-auto-flow:row; grid-template-rows:none; grid-template-columns:repeat(3, 185px);
      grid-auto-rows:100px;
      overflow-x:hidden; overflow-y:auto; align-content:start; justify-content:center;
    }
  }
  .tile{
    width:185px; aspect-ratio:1.85; position:relative; flex:0 0 auto;
    background:#fff; border:1.5px solid var(--frame-border); overflow:hidden; cursor:pointer; touch-action:none;
  }
  @media (orientation: portrait){ .tile{ width:185px; height:100px; } }
  .tile img{ position:relative; width:100%; height:100%; object-fit:contain; display:block; -webkit-user-drag:none; }
  .tile-hint{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#B8B8BC; }
  .tile-hint svg{ width:16px; height:16px; opacity:.5; }
  .tile-badge{ position:absolute; top:4px; right:5px; font-family:var(--font-mono); font-size:9.5px; color:#fff; background:rgba(20,20,22,.55); padding:2px 5px; border-radius:5px; pointer-events:none; }
  .tile.dragging{ z-index:60; box-shadow:0 20px 40px rgba(0,0,0,.5); }

  .loading-state{ margin:auto; color:var(--text-faint); font-size:13px; font-family:var(--font-mono); }

  .empty-state{ margin:auto; display:flex; flex-direction:column; align-items:center; gap:14px; color:var(--text-dim); padding:40px; text-align:center; }
  .empty-icon{ color:var(--text-faint); }
  .empty-icon svg{ width:46px; height:46px; }
  .empty-state p{ font-size:14.5px; margin:0; }
  .empty-add-btn{ display:flex; align-items:center; gap:8px; padding:11px 20px; border-radius:23px; background:var(--accent); color:#fff; font-weight:700; font-size:13.5px; }
  .empty-add-btn svg{ width:16px; height:16px; }
  body.view-mode .empty-add-btn{ display:none; }

  .gutter{ flex:0 0 30px; display:flex; align-items:center; justify-content:center; position:relative; }
  @media (orientation: portrait){ .gutter{ flex:0 0 20px; } .gutter:not(:first-child){ margin-top:20px; } }
  @media (orientation: portrait){ body.view-mode .gutter{ margin-top:0; } }
  body.view-mode .gutter{ flex:0 0 0; }
  .add-btn{
    width:27px; height:27px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    border:1.6px dashed var(--line-strong); color:var(--text-dim); opacity:.55;
  }
  .add-btn svg{ width:13px; height:13px; }
  .add-btn:hover{ opacity:1; border-color:var(--accent); color:var(--accent); }
  .add-btn:active{ transform:scale(.88); }
  body.view-mode .add-btn{ display:none; }

  .cut-unit{
    flex:0 0 clamp(284px, 35.2vw, 354px); min-width:0;
    display:flex; flex-direction:column; height:100%;
    padding:0 6px;
  }
  body.view-mode .cut-unit{ flex-basis:clamp(340px, 44vw, 470px); padding:0; }
  @media (orientation: portrait){

    body.view-mode .cut-unit{ flex-basis:auto; }
    .handle-row{ margin-top:20px; }
  }

  .cut-unit.dragging{ transition:none; z-index:80; }
  .cut-unit.dragging .card{ box-shadow:0 26px 50px rgba(0,0,0,.5); }

  @keyframes justMoved{
    0%{ box-shadow:0 0 0 3px var(--accent), 0 10px 22px rgba(0,0,0,.4); }
    100%{ box-shadow:0 10px 22px rgba(0,0,0,.4); }
  }
  @keyframes justMovedRing{
    0%{ box-shadow:0 0 0 3px rgba(224,80,42,1); }
    100%{ box-shadow:0 0 0 3px rgba(224,80,42,0); }
  }
  .cut-unit.just-moved .card{ animation:justMoved 1600ms ease-out; }
  /* Tiles have no permanent shadow of their own (unlike .card), so use the pure ring fade. */
  .tile.just-moved{ animation:justMovedRing 1600ms ease-out; }
  .project-row.just-moved, .scene-row.just-moved{ animation:justMoved 1600ms ease-out; border-radius:11px; }

  /* handle row: scene (left) / reorder (center) / cut number (right) */
  .handle-row{ flex:0 0 auto; height:30px; margin-bottom:7px; position:relative; }
  .scene-input-top{
    position:absolute; left:0; top:50%; transform:translateY(-50%); width:80px;
    font-family:var(--font-mono); font-size:11px; letter-spacing:.03em; text-transform:uppercase;
    color:var(--text); background:var(--bg-elevated-2); border:1px solid var(--line-strong);
    border-radius:8px; padding:5px 8px;
  }

  }

  .handle-btn{

    display:flex; align-items:center; justify-content:center; touch-action:none;
  }
  .handle-btn svg{ width:15px; height:15px; }
  .handle-btn:hover{ color:var(--text); }
  body.view-mode .handle-btn{ visibility:hidden; }
  .select-circle{
    width:26px; height:26px; border-radius:50%; flex:0 0 auto;
    border:2px solid rgba(255,255,255,.5); background:rgba(0,0,0,.3);
    display:flex; align-items:center; justify-content:center; touch-action:none;
  }
  .select-circle svg{ width:14px; height:14px; color:#fff; opacity:0; transition:opacity .15s ease; }
  .select-circle.selected{ background:var(--accent); border-color:var(--accent); }
  .select-circle.selected svg{ opacity:1; }
  .tile-select-circle{ position:absolute; top:5px; left:5px; z-index:4; }
  .delete-chip{
    display:none; position:absolute; left:50%; top:100%; transform:translateX(-50%); margin-top:4px;
    align-items:center; gap:5px; height:26px; padding:0 11px; z-index:5;
    border-radius:13px; background:var(--danger); color:#fff; font-size:12px; font-weight:700; white-space:nowrap;
  }
  .delete-chip:active{ transform:translateX(-50%) scale(.95); }
  .delete-chip svg{ width:12px; height:12px; }
  .cut-unit.menu-open .delete-chip{ display:inline-flex; }

  .card{
    flex:1 1 auto; min-height:0; min-width:0; display:flex; flex-direction:column;
    background:var(--paper); border-radius:0; overflow:hidden;
    box-shadow:0 10px 22px rgba(0,0,0,.4); border:1px solid rgba(0,0,0,.06);
  }
  @media (orientation: portrait){ .card{ flex-direction:row; aspect-ratio:3.7; } }
  body.view-mode .card{ border:1px solid rgba(0,0,0,.7); }

  /* ---------- Frame (cinema-ratio artwork area — drawing only) ---------- */
  .frame{
    position:relative; width:100%; aspect-ratio:1.85; flex:0 0 auto;
    background:#fff; overflow:hidden; border-bottom:1.5px solid var(--frame-border);
  }
  @media (orientation: portrait){
    /* height comes from the card's own aspect-ratio (see .card above), not from this box's own
       aspect-ratio, so it can never be stretched taller than 1.85:1 by the notes column */
    .frame{ width:50%; flex:0 0 50%; height:100%; aspect-ratio:auto; border-bottom:none; border-right:1.5px solid var(--frame-border); }
  }
  .frame-canvas{ position:relative; width:100%; height:100%; display:block; touch-action:pan-x; }
  @media (orientation: portrait){ .frame-canvas{ touch-action:pan-y; } }
  .frame-guide-239{
    position:absolute; left:0; right:0; top:11.3%; bottom:11.3%;
    border-top:1px solid var(--frame-guide); border-bottom:1px solid var(--frame-guide);
    pointer-events:none;
  }
  .frame-guide-133{
    position:absolute; top:0; bottom:0; left:14.05%; right:14.05%;
    border-left:1px solid var(--frame-guide); border-right:1px solid var(--frame-guide);
    pointer-events:none;
  }
  .frame-hint{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:5px; color:#B8B8BC; pointer-events:none; text-align:center;
  }
  .frame-hint svg{ width:18px; height:18px; opacity:.55; }
  .frame-hint span{ font-size:11px; }

  /* ---------- Notes (line-by-line) ---------- */
  .card .notes{ flex:1 1 auto; min-height:0; min-width:0; background:var(--paper); position:relative; }
  @media (orientation: portrait){ .card .notes{ height:100%; } }
  .notes-lines{
    position:relative; height:100%; width:100%; min-width:0; overflow-y:hidden; overflow-x:hidden;
    display:flex; flex-direction:column; padding:0 0 10px;
    background-image: linear-gradient(var(--paper) 36px, var(--paper-line) 36px, var(--paper-line) 37.5px, var(--paper) 37.5px);
    background-size:100% 37.5px; background-attachment:local;
  }
  .note-line{
    width:100%; min-width:0; height:37.5px; line-height:37.5px; flex:0 0 auto;
    border:none; background:transparent; padding:0 16px; font-size:20.25px; color:var(--ink); outline:none;

  }

  .notes-lines.expanded{

    background-image: linear-gradient(var(--paper) 43.5px, var(--paper-line) 43.5px, var(--paper-line) 45px, var(--paper) 45px);
    background-size:100% 45px;
  }
  .notes-lines.expanded .note-line{ height:45px; line-height:45px; font-size:23.25px; padding:0 22px; }

  /* ---------- Notes expand overlay (long-press) ---------- */
  .notes-expand-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:opacity .28s ease; z-index:150; }
  .notes-expand-backdrop.show{ opacity:1; pointer-events:auto; }
  .notes-expand-panel{
    position:fixed; background:var(--paper); z-index:151; border-radius:18px; overflow:hidden;
    display:flex; flex-direction:column; box-shadow:0 30px 70px rgba(0,0,0,.5);
    opacity:0; pointer-events:none;
    transition:opacity .22s ease, top .32s cubic-bezier(.32,.72,0,1), left .32s cubic-bezier(.32,.72,0,1), width .32s cubic-bezier(.32,.72,0,1), height .32s cubic-bezier(.32,.72,0,1);
  }
  .notes-expand-panel.show{ opacity:1; pointer-events:auto; }
  .notes-expand-header{
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; border-bottom:1px solid var(--paper-line); background:var(--paper);
  }

  .notes-expand-done{ padding:7px 15px; border-radius:16px; background:var(--accent); color:#fff; font-weight:700; font-size:12.5px; }
  .notes-expand-body{ flex:1 1 auto; min-height:0; }

  .notes-format-toolbar{
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:9px 16px; border-bottom:3px solid var(--ink); background:var(--paper);
  }
  .notes-format-colors{ display:flex; align-items:center; gap:7px; }
  .notes-color-swatch{ width:22px; height:22px; border-radius:50%; border:2px solid transparent; padding:0; flex:0 0 auto; }
  .notes-color-swatch.active{ border-color:var(--ink-dim); }
  .notes-format-styles{ display:flex; align-items:center; gap:4px; }
  .notes-style-btn{
    width:30px; height:30px; border-radius:8px; background:var(--paper-line); color:var(--ink);
    font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center;
  }
  .notes-style-btn.active{ background:var(--accent); color:#fff; }
  .note-line[data-placeholder]:empty::before{ content:attr(data-placeholder); color:var(--ink-dim); pointer-events:none; }

  /* ---------- Editor modal (Frame drawing) ---------- */
  .editor-modal{
    position:fixed; inset:0; background:var(--bg-deep); z-index:100;
    display:flex; flex-direction:column;
    /* 108% instead of exactly 100%: 100dvh-based layouts can leave a subpixel sliver visible
       at the bottom edge when "hidden"; the extra margin guarantees it's fully off-screen. */
    transform:translateY(108%); transition:transform .34s cubic-bezier(.32,.72,0,1);
  }
  .editor-modal.open{ transform:translateY(0); }
  .editor-topbar{
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding: max(14px, env(safe-area-inset-top)) 16px 10px;
  }
  .editor-done-btn{ display:flex; align-items:center; gap:6px; padding:9px 16px; border-radius:20px; background:var(--accent); color:#fff; font-weight:700; font-size:13.5px; }
  .editor-done-btn svg{ width:15px; height:15px; }
  .editor-label{ font-family:var(--font-mono); color:var(--text-dim); font-size:12px; letter-spacing:.06em; }
  .editor-topbar-spacer{ width:70px; }

  .editor-canvas-wrap{ flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center; padding:8px 18px; position:relative; }
  .editor-frame-inner{
    position:relative; max-width:100%; max-height:100%; aspect-ratio:1.85; background:#fff;
    border:1.5px solid var(--frame-border); box-shadow:0 24px 60px rgba(0,0,0,.5);
  }
  #editorCanvas{ position:relative; width:100%; height:100%; display:block; touch-action:none; }
  .editor-empty-hint{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    color:rgba(0,0,0,.32); pointer-events:none; text-align:center;
  }
  .editor-empty-hint svg{ width:24px; height:24px; opacity:.6; }
  .editor-empty-hint p{ margin:0; font-size:13px; line-height:1.5; }

  .editor-toolbar{
    flex:0 0 auto; display:flex; align-items:center; gap:9px;
    padding:10px 14px max(12px, env(safe-area-inset-bottom));
    overflow-x:auto; background:rgba(255,255,255,.03); border-top:1px solid var(--line);
  }
  .tool-divider{ width:1px; align-self:stretch; margin:4px 3px; background:var(--line-strong); flex:0 0 auto; }
  .tool-btn{ width:38px; height:38px; border-radius:10px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:var(--text-dim); border:1px solid transparent; }
  .tool-btn svg{ width:19px; height:19px; }
  .tool-btn.active{ background:var(--accent-soft); color:var(--accent); border-color:var(--accent-dim); }
  .eraser-type-toggle{ display:flex; gap:2px; background:var(--bg-elevated-2); border-radius:9px; padding:2px; flex:0 0 auto; border:1px solid transparent; }
  .eraser-type-toggle.tool-active{ border-color:var(--accent-dim); }
  .eraser-icon-btn{ width:30px; height:30px; display:flex; align-items:center; justify-content:center; padding:0; color:var(--text-dim); }
  .eraser-icon-btn svg{ width:16px; height:16px; }
  .eraser-type-btn{ padding:7px 9px; border-radius:7px; font-size:10.5px; font-weight:700; color:var(--text-dim); white-space:nowrap; }
  .eraser-type-btn.active{ background:var(--bg-elevated); color:var(--accent); }
  .eraser-icon-btn.active{ background:transparent; color:var(--text-dim); }
  .color-swatch{ width:26px; height:26px; border-radius:50%; flex:0 0 auto; background:var(--sw); border:2px solid rgba(255,255,255,.22); }
  .color-swatch.active{ box-shadow:0 0 0 3px var(--bg-deep), 0 0 0 5px var(--sw); }
  .size-dot{ width:30px; height:30px; border-radius:9px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; border:1px solid transparent; }
  .size-dot i{ display:block; border-radius:50%; background:var(--text); font-style:normal; }
  .size-dot[data-size="4"] i{ width:5px; height:5px; }
  .size-dot[data-size="8"] i{ width:9px; height:9px; }
  .size-dot[data-size="14"] i{ width:14px; height:14px; }
  .size-dot[data-size="22"] i{ width:19px; height:19px; }
  .size-dot[data-size="32"] i{ width:24px; height:24px; }
  .size-dot.active{ background:var(--bg-elevated-2); border-color:var(--line-strong); }
  .icon-btn.labeled{ width:auto; padding:0 13px; gap:6px; font-size:12.5px; font-weight:700; border:1px solid var(--line-strong); border-radius:19px; }
  .icon-btn.labeled svg{ width:16px; height:16px; }

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; left:50%; bottom:28px; transform:translate(-50%,12px);
    background:rgba(24,24,27,.94); color:#fff; padding:10px 18px; border-radius:13px;
    font-size:13px; opacity:0; pointer-events:none; z-index:200; backdrop-filter:blur(6px);
    transition:opacity .25s ease, transform .25s ease; max-width:80vw; text-align:center;
  }
  .toast.show{ opacity:1; transform:translate(-50%,0); }

  .confirm-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.55); opacity:0; pointer-events:none; transition:opacity .2s ease; z-index:250; }
  .confirm-backdrop.show{ opacity:1; pointer-events:auto; }
  .confirm-modal{
    position:fixed; left:50%; top:50%; transform:translate(-50%,-48%); width:min(320px, 84vw);
    background:var(--bg-elevated); border-radius:16px; padding:20px 18px 16px; z-index:251;
    opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease;
    box-shadow:0 24px 60px rgba(0,0,0,.5);
  }
  .confirm-modal.show{ opacity:1; pointer-events:auto; transform:translate(-50%,-50%); }
  .confirm-modal p{ margin:0 0 18px; font-size:14px; line-height:1.5; color:var(--text); }

  /* Scene long-press popup (Rename / Move / Trash) — replaces the old inline chips, which
     squeezed the scene label into an unreadably narrow column once a third chip was added. */
  .scene-action-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:opacity .2s ease; z-index:250; }
  .scene-action-backdrop.show{ opacity:1; pointer-events:auto; }
  .scene-action-sheet{
    position:fixed; width:190px;
    background:var(--bg-elevated); border-radius:14px; padding:6px; z-index:251;
    opacity:0; pointer-events:none; transition:opacity .15s ease, transform .15s ease;
    box-shadow:0 16px 40px rgba(0,0,0,.45); transform:scale(.95); transform-origin:top left;
  }
  .scene-action-sheet.show{ opacity:1; pointer-events:auto; transform:scale(1); }
  .scene-action-sheet-title{ padding:12px 12px 10px; font-family:var(--font-mono); font-size:12px; font-weight:700; color:var(--text-dim); letter-spacing:.04em; text-align:center; }
  .scene-action-sheet-btn{
    display:block; width:100%; padding:13px 14px; border-radius:11px; font-size:14.5px; font-weight:600;
    color:var(--text); text-align:center;
  }
  .scene-action-sheet-btn:hover{ background:var(--bg-elevated-2); }
  .scene-action-sheet-btn + .scene-action-sheet-btn{ margin-top:2px; }
  .scene-action-sheet-btn.danger{ color:var(--danger); }
  .scene-action-sheet-btn.cancel{ margin-top:6px; color:var(--text-dim); border-top:1px solid var(--line); border-radius:0 0 11px 11px; padding-top:15px; }
  .confirm-actions{ display:flex; gap:10px; }
  .confirm-btn{ flex:1 1 0; padding:11px; border-radius:12px; font-size:14px; font-weight:700; }
  .confirm-cancel{ background:var(--bg-elevated-2); color:var(--text); }
  .confirm-ok{ background:var(--danger); color:#fff; }
  .confirm-ok-primary{ background:var(--accent); color:#fff; }
  .prompt-input{
    width:100%; box-sizing:border-box; margin:0 0 16px; padding:11px 12px;
    background:var(--bg-elevated-2); border:1px solid var(--line-strong); border-radius:10px;
    color:var(--text); font-size:15px; font-weight:600; text-transform:uppercase;
  }
  .prompt-input::placeholder{ color:var(--text-faint); text-transform:none; }

  .select-toolbar{
    position:fixed; left:50%; bottom:0; transform:translate(-50%,108%); width:min(680px, 96vw);
    background:var(--bg-elevated); border-radius:18px 18px 0 0;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    display:flex; align-items:center; gap:14px; z-index:120;
    transition:transform .28s cubic-bezier(.32,.72,0,1);
    border:1px solid var(--line-strong); border-bottom:none;
  }
  /* The shadow only applies once the toolbar is actually on-screen — a permanent shadow on
     the base rule would still bleed upward past the viewport edge (its blur radius reaches
     further than the translateY offset pushes the box down), showing as a smudge at the
     bottom of the screen even while the toolbar itself was fully hidden. */
  body.select-mode .select-toolbar{ transform:translate(-50%,0); box-shadow:0 -10px 30px rgba(0,0,0,.4); }
  /* Select mode: notes shouldn't be focusable/editable — taps should fall through to the
     card's select-toggle handler instead. The Frame's own tap-to-draw/tap-to-edit is guarded
     in JS (setupInlineCanvas) since it also needs to distinguish Apple Pencil input. */
  body.select-mode .cut-unit .note-line{ pointer-events:none; }
  body.select-mode .cut-unit .card{ cursor:pointer; }
  .select-all-btn{ display:flex; align-items:center; gap:7px; flex:0 0 auto; font-size:12px; font-weight:700; color:var(--text-dim); }
  .select-all-circle{ width:20px; height:20px; border-radius:50%; border:2px solid var(--text-faint); display:block; flex:0 0 auto; }
  .select-all-btn.all-selected .select-all-circle{ background:var(--accent); border-color:var(--accent); }
  .select-count{ flex:1 1 auto; font-size:12.5px; color:var(--text-dim); text-align:center; }
  .select-actions{ display:flex; gap:8px; flex:0 0 auto; }
  .select-action-btn{ padding:9px 14px; border-radius:12px; background:var(--bg-elevated-2); color:var(--text); font-size:12.5px; font-weight:700; border:1px solid var(--line-strong); white-space:nowrap; }
  .select-action-btn.danger{ background:var(--danger); color:#fff; border-color:var(--danger); }

  .scene-picker-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:opacity .2s ease; z-index:250; }
  .scene-picker-backdrop.show{ opacity:1; pointer-events:auto; }
  .scene-picker-modal{
    position:fixed; left:50%; bottom:0; transform:translate(-50%,108%); width:min(420px, 92vw);
    max-height:70vh; background:var(--bg-elevated); border-radius:18px 18px 0 0; z-index:251;
    display:flex; flex-direction:column; transition:transform .26s cubic-bezier(.32,.72,0,1);
  }
  .scene-picker-modal.show{ transform:translate(-50%,0); box-shadow:0 -20px 50px rgba(0,0,0,.5); }
  .scene-picker-header{ display:flex; align-items:center; justify-content:space-between; padding:16px 18px 10px; font-size:14px; font-weight:700; color:var(--text); border-bottom:1px solid var(--line); flex:0 0 auto; }
  .scene-picker-cancel{ font-size:13px; font-weight:600; color:var(--accent); }
  .scene-picker-list{ overflow-y:auto; padding:8px 10px calc(14px + env(safe-area-inset-bottom)); }
  .scene-picker-item{ display:flex; flex-direction:column; align-items:flex-start; gap:2px; width:100%; padding:11px 12px; border-radius:11px; }
  .scene-picker-item:hover{ background:var(--bg-elevated-2); }

  .sidebar-header-count{ font-weight:400; text-transform:none; letter-spacing:0; color:var(--text-faint); font-size:11px; }
  .project-trash-count{ margin-left:auto; padding-left:8px; font-family:var(--font-mono); font-size:11px; color:var(--text-faint); flex:0 0 auto; }
  .trash-folder-icon{ color:var(--danger); }
</style>
</head>
<body>

<div id="app">
  <header class="topbar">
    <button id="sidebarToggle" class="icon-btn" aria-label="Open sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="15" rx="3"/><path d="M9.5 4.5v15"/></svg>
    </button>
    <button id="topUndoBtn" class="icon-btn disabled" aria-label="Undo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10h9a5 5 0 0 1 0 10h-2M3 10l5-5M3 10l5 5"/></svg>
    </button>
    <button id="topRedoBtn" class="icon-btn disabled" aria-label="Redo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10h-9a5 5 0 0 0 0 10h2M21 10l-5-5M21 10l-5 5"/></svg>
    </button>
    <div class="brand">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 5v14M17 5v14M3 9.5h4M3 14.5h4M17 9.5h4M17 14.5h4"/></svg>
      </span>
      <h1 id="projectTitle" contenteditable="true" spellcheck="false">Untitled Storyboard</h1>
    </div>
    <div class="view-toggle">
      <button id="viewBasicBtn" class="view-toggle-btn active" aria-label="Basic view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
      </button>
      <button id="viewTileBtn" class="view-toggle-btn" aria-label="Tile view">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1"/><rect x="13" y="4" width="7" height="7" rx="1"/><rect x="4" y="13" width="7" height="7" rx="1"/><rect x="13" y="13" width="7" height="7" rx="1"/></svg>
      </button>
    </div>
    <div class="topbar-controls" id="topbarMainControls">
      <button id="addSceneBtn" class="add-scene-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>Scene</span>
      </button>
      <button id="selectBtn" class="select-toggle-btn">Select</button>
      <button id="editToggleBtn" class="edit-toggle-btn">Edit</button>
    </div>
    <div class="topbar-controls" id="topbarTrashControls" style="display:none">
      <button id="trashSelectBtn" class="select-toggle-btn">Select</button>
      <button id="emptyTrashBtn" class="edit-toggle-btn">Empty</button>
    </div>
  </header>

  <div class="workspace">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-scroll">
        <div class="folder-section" id="projectsFolderSection">
          <div class="folder-header-row">
            <button class="folder-header-toggle" id="projectsFolderToggle">
              <svg class="folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/></svg>
              <span>Projects</span>
              <svg class="folder-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <button class="sort-btn" id="projectSortBtn" aria-label="Sort projects">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6h12M8.5 11.5h7M11 17h2"/></svg>
            </button>
            <div class="sort-menu" id="projectSortMenu">
              <button class="sort-option" data-field="title">Title <span class="sort-dir"></span></button>
              <button class="sort-option" data-field="created">Date Created <span class="sort-dir"></span></button>
              <button class="sort-option" data-field="updated">Date Edited <span class="sort-dir"></span></button>
            </div>
          </div>
          <div class="folder-body" id="projectsList"></div>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-header">Scenes <span class="sidebar-header-count" id="scenesCutCount"></span></div>
        <div class="sidebar-list" id="sidebarSceneList"></div>
        <div class="sidebar-divider"></div>
        <div class="folder-section collapsed" id="trashFolderSection">
          <div class="folder-header-row">
            <button class="folder-header-toggle" id="trashFolderToggle">
              <svg class="folder-icon trash-folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-8 0 1 12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2l1-12"/></svg>
              <span>Trash</span>
              <svg class="folder-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </button>
          </div>
          <div class="folder-body" id="trashProjectsList"></div>
        </div>
      </div>
      <div class="sidebar-footer">
        <p class="sidebar-hint">Enter a scene number in each shot's SCENE field and it will appear here.</p>
        <div class="backup-row">
          <button id="exportBtn" class="backup-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0-4-4m4 4 4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
            <span>Export Backup</span>
          </button>
          <button id="importBtn" class="backup-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 0 4 4m-4-4-4 4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
            <span>Import Backup</span>
          </button>
        </div>
        <input type="file" id="importInput" accept="application/json,.json" hidden>
      </div>
    </aside>
    <div class="backdrop" id="backdrop"></div>

    <div class="stage">
      <div class="sprockets"></div>
      <div class="filmstrip" id="filmstrip">
        <div class="loading-state">Loading…</div>
      </div>
      <div class="sprockets-bottom"></div>
    </div>
  </div>
</div>

<div class="notes-expand-backdrop" id="notesExpandBackdrop"></div>
<div class="notes-expand-panel" id="notesExpandPanel">
  <div class="notes-expand-header">
    <span id="notesExpandLabel">SHOT 01 — NOTES</span>
    <button id="notesExpandDone" class="notes-expand-done">Done</button>
  </div>
  <div class="notes-format-toolbar" id="notesFormatToolbar">
    <div class="notes-format-colors" id="notesColorSwatches">
      <button class="notes-color-swatch active" data-color="#221F1C" style="background:#221F1C"></button>
      <button class="notes-color-swatch" data-color="#E0502A" style="background:#E0502A"></button>
      <button class="notes-color-swatch" data-color="#2E6BE0" style="background:#2E6BE0"></button>
      <button class="notes-color-swatch" data-color="#2E9E4F" style="background:#2E9E4F"></button>
      <button class="notes-color-swatch" data-color="#9B4FE0" style="background:#9B4FE0"></button>
      <button class="notes-color-swatch" data-color="#9A9A9E" style="background:#9A9A9E"></button>
    </div>
    <div class="notes-format-styles">
      <button class="notes-style-btn" data-style="bold" title="Bold"><b>B</b></button>
      <button class="notes-style-btn" data-style="italic" title="Italic"><i>I</i></button>
      <button class="notes-style-btn" data-style="underline" title="Underline"><u>U</u></button>
      <button class="notes-style-btn" data-style="strikethrough" title="Strikethrough"><s>S</s></button>
    </div>
  </div>
  <div class="notes-expand-body">
    <div class="notes-lines expanded" id="notesExpandLines"></div>
  </div>
</div>

<div class="editor-modal" id="editorModal" tabindex="-1">
  <div class="editor-topbar">
    <button id="editorCloseBtn" class="editor-done-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>
      <span>Done</span>
    </button>
    <div class="editor-label">SHOT <span id="editorCutNum">01</span></div>
    <div class="editor-topbar-spacer"></div>
  </div>

  <div class="editor-canvas-wrap">
    <div class="editor-frame-inner" id="editorFrameInner">
      <div class="frame-guide-239" id="editorGuide239"></div>
      <div class="frame-guide-133" id="editorGuide133"></div>
      <canvas id="editorCanvas"></canvas>
      <div class="editor-empty-hint" id="editorEmptyHint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16.5 3.5 4 4L7 21H3v-4L16.5 3.5Z"/></svg>
        <p>Draw with your finger or Pencil,<br>or paste a photo</p>
      </div>
    </div>
  </div>

  <div class="editor-toolbar">
    <button class="tool-btn active" data-tool="pen" aria-label="Pen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16.5 3.5 4 4L7 21H3v-4L16.5 3.5Z"/></svg>
    </button>
    <div class="eraser-type-toggle" id="eraserTypeToggle">
      <button class="eraser-type-btn eraser-icon-btn" data-eraser-type="object" aria-label="Eraser">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H8l-5-5a2 2 0 0 1 0-2.8l9-9a2 2 0 0 1 2.8 0l5.2 5.2a2 2 0 0 1 0 2.8L13 18"/></svg>
      </button>
      <button class="eraser-type-btn" data-eraser-type="object">Object</button>
      <button class="eraser-type-btn" data-eraser-type="pixel">Pixel</button>
    </div>
    <button class="tool-btn" data-tool="move" aria-label="Move photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
    </button>
    <div class="tool-divider"></div>
    <button class="color-swatch active" data-color="#221F1C" style="--sw:#221F1C" aria-label="Black"></button>
    <button class="color-swatch" data-color="#E0502A" style="--sw:#E0502A" aria-label="Red"></button>

<script>
(function(){
  'use strict';

  /* ===================== Icons (dynamic) ===================== */
  const ICONS = {
    plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
    grip: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>',
    trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m-8 0 1 12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2l1-12"/></svg>',
    pencil: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16.5 3.5 4 4L7 21H3v-4L16.5 3.5Z"/></svg>',
    film: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 5v14M17 5v14M3 9.5h4M3 14.5h4M17 9.5h4M17 14.5h4"/></svg>',
    check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>'
  };

  /* ===================== State ===================== */
  let projects = [];               /* [{id, title, createdAt, updatedAt}] */
  let projectDataCache = {};       /* id -> {title, order, trashOrder, cuts} — fully preloaded for instant switching */
  let currentProjectId = null;
  let state = { title: 'Untitled Storyboard', order: [], trashOrder: [], cuts: {} };
  let editMode = false;
  let appMode = 'main'; /* 'main' | 'trash' */
  let selectMode = false;
  let selectedIds = new Set();
  let openMenuUnitId = null;
  let projectSort = { field: 'created', dir: 'desc' }; /* 'title' | 'created' | 'updated' | 'custom' */
  let viewMode = 'basic'; /* 'basic' | 'tile' */
  let sceneEditedIds = new Set();
  let undoStack = [];
  let redoStackGlobal = [];
  const MAX_UNDO = 30;

  const CANVAS_W = 1332, CANVAS_H = 720; /* 1.85:1 */
  const MIN_LINES = 10;
  const INLINE_PEN_COLOR = '#221F1C';
  const INLINE_PEN_SIZE = 7;

  const saveTimers = {};

  function uid(prefix){ return (prefix||'c') + Math.random().toString(36).slice(2, 9); }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* Forces an <input>'s value to uppercase in place, preserving cursor position
     (setting .value directly would otherwise jump the cursor to the end). */
  function enforceUppercaseInput(input){
    const pos = input.selectionStart;
    const upper = input.value.toUpperCase();
    if(upper !== input.value){
      input.value = upper;
      try{ input.setSelectionRange(pos, pos); }catch(e){}
    }
  }

  function isPortrait(){ return window.innerWidth < window.innerHeight; }

  /* ===================== Storage (Claude storage in-chat, localStorage standalone) ===================== */
  const hasClaudeStorage = !!(window.storage && window.storage.get && window.storage.set);
  function lsAvailable(){
    try{ const k = '__lstest__'; localStorage.setItem(k, '1'); localStorage.removeItem(k); return true; }catch(e){ return false; }
  }
  const hasLocalStorage = !hasClaudeStorage && lsAvailable();
  const LS_PREFIX = 'storyboard-app:';

  async function storGet(key){
    if(hasClaudeStorage){
      try{ const r = await window.storage.get(key, false); return r ? r.value : null; }catch(e){ return null; }
    }
    if(hasLocalStorage){
      try{ return localStorage.getItem(LS_PREFIX + key); }catch(e){ return null; }
    }
    return null;
  }
  async function storSet(key, value){
    if(hasClaudeStorage){
      try{ await window.storage.set(key, value, false); }catch(e){ console.error('storage set failed', key, e); }
      return;
    }
    if(hasLocalStorage){
      try{ localStorage.setItem(LS_PREFIX + key, value); }catch(e){ console.error('localStorage set failed', key, e); }
    }
  }
  async function storDelete(key){
    if(hasClaudeStorage){
      try{ await window.storage.delete(key, false); }catch(e){ /* ignore */ }
      return;
    }
    if(hasLocalStorage){
      try{ localStorage.removeItem(LS_PREFIX + key); }catch(e){ /* ignore */ }
    }
  }
  if(navigator.storage && navigator.storage.persist){
    navigator.storage.persist().catch(() => {});
  }

  /* ---- project-scoped save helpers (explicit id, safe to use during preload) ---- */
  function saveMetaFor(pid, title){ return storSet('project:' + pid + ':meta', JSON.stringify({ title })); }
  function saveOrderFor(pid, order){ return storSet('project:' + pid + ':order', JSON.stringify(order)); }
  function saveTrashOrderFor(pid, trashOrder){ return storSet('project:' + pid + ':trash', JSON.stringify(trashOrder)); }
  function saveCutFor(pid, id, cut){
    return storSet('project:' + pid + ':cut:' + id, JSON.stringify({
      scene: cut.scene || '', notes: cut.notes || '', image: cut.image || null,
      notesHtml: cut.notesHtml || null,
      editorStrokes: Array.isArray(cut.editorStrokes) ? cut.editorStrokes : null,
      editorPhoto: cut.editorPhoto || null,
      editorPhotoTransform: cut.editorPhotoTransform || null,
      editorActions: Array.isArray(cut.editorActions) ? cut.editorActions : null,
      editorRedoActions: Array.isArray(cut.editorRedoActions) ? cut.editorRedoActions : null,
      trashedScene: cut.trashedScene != null ? cut.trashedScene : null,
      trashedShotNumber: cut.trashedShotNumber != null ? cut.trashedShotNumber : null,
      trashedAt: cut.trashedAt != null ? cut.trashedAt : null
    }));
  }
  function saveProjectsIndex(){ return storSet('projects-index', JSON.stringify(projects)); }

  function touchProjectUpdated(pid){
    const p = projects.find(x => x.id === pid);
    if(p){ p.updatedAt = Date.now(); debouncedSaveProjectsIndex(); }
  }

  /* ---- current-project save wrappers ---- */
  function saveOrder(){ touchProjectUpdated(currentProjectId); return saveOrderFor(currentProjectId, state.order); }
  function saveTrashOrder(){ touchProjectUpdated(currentProjectId); return saveTrashOrderFor(currentProjectId, state.trashOrder); }
  function saveMeta(){ touchProjectUpdated(currentProjectId); return saveMetaFor(currentProjectId, state.title); }
  function saveCut(id){
    const c = state.cuts[id];
    if(!c) return;
    touchProjectUpdated(currentProjectId);
    return saveCutFor(currentProjectId, id, c);
  }
  function debouncedSaveCut(id){
    const pid = currentProjectId;
    clearTimeout(saveTimers[id]);
    saveTimers[id] = setTimeout(() => { if(pid === currentProjectId) saveCut(id); }, 650);
  }
  function debouncedSaveMeta(){
    const pid = currentProjectId;
    clearTimeout(saveTimers.__meta);
    saveTimers.__meta = setTimeout(() => { if(pid === currentProjectId) saveMeta(); }, 650);
  }
  function debouncedSaveProjectsIndex(){
    clearTimeout(saveTimers.__projidx);
    saveTimers.__projidx = setTimeout(() => saveProjectsIndex(), 500);
  }

  async function loadProjectsIndex(){
    const raw = await storGet('projects-index');
    if(raw){ try{ projects = JSON.parse(raw); }catch(e){ projects = []; } }
    if(!projects || !Array.isArray(projects) || projects.length === 0){
      const now = Date.now();
      const id = uid('p');
      projects = [{ id, title: 'Untitled Storyboard', createdAt: now, updatedAt: now }];
      await storSet('projects-index', JSON.stringify(projects));
      await storSet('active-project', id);
      currentProjectId = id;
      return;
    }
    const activeRaw = await storGet('active-project');
    currentProjectId = (activeRaw && projects.some(p => p.id === activeRaw)) ? activeRaw : projects[0].id;
  }

  async function loadProjectDataFresh(id){
    const data = { title: 'Untitled Storyboard', order: [], trashOrder: [], cuts: {} };
    const metaRaw = await storGet('project:' + id + ':meta');
    if(metaRaw){ try{ const m = JSON.parse(metaRaw); if(m.title) data.title = m.title; }catch(e){} }
    const orderRaw = await storGet('project:' + id + ':order');
    if(orderRaw){ try{ data.order = JSON.parse(orderRaw); }catch(e){ data.order = []; } }
    const trashRaw = await storGet('project:' + id + ':trash');
    if(trashRaw){ try{ data.trashOrder = JSON.parse(trashRaw); }catch(e){ data.trashOrder = []; } }
    const allIds = data.order.concat(data.trashOrder);
    await Promise.all(allIds.map(async cid => {
      const raw = await storGet('project:' + id + ':cut:' + cid);
      if(raw){ try{ const c = JSON.parse(raw); c.id = cid; data.cuts[cid] = c; }catch(e){} }
    }));
    data.order = data.order.filter(cid => data.cuts[cid]);
    data.trashOrder = data.trashOrder.filter(cid => data.cuts[cid]);
    if(data.order.length === 0 && data.trashOrder.length === 0){
      for(let i = 0; i < 10; i++){
        const cid = uid('c');
        data.cuts[cid] = { id: cid, scene: 'S#1', notes: '', image: null };
        data.order.push(cid);
      }
      saveOrderFor(id, data.order);
      data.order.forEach(cid => saveCutFor(id, cid, data.cuts[cid]));
    }
    const proj = projects.find(p => p.id === id);
    if(proj) proj.title = data.title;
    return data;
  }

  async function ensureProjectLoaded(id){
    if(projectDataCache[id]) return projectDataCache[id];
    const data = await loadProjectDataFresh(id);
    projectDataCache[id] = data;
    return data;
  }

  /* Loads whichever projects aren't cached yet, in the background (does not block rendering). */
  async function preloadRemainingProjects(){
    await Promise.all(projects.filter(p => !projectDataCache[p.id]).map(p => ensureProjectLoaded(p.id)));
    /* Trash folder's per-project counts depend on data that may have just finished loading. */
    renderTrashProjectsList();
  }

  /* ===================== Toast ===================== */
  let toastTimer = null;
  function showToast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  /* ===================== Confirm dialog (custom — window.confirm is unreliable in sandboxed iframes) ===================== */
  function showConfirm(message, okLabel){
    return new Promise(resolve => {
      const backdrop = document.getElementById('confirmBackdrop');
      const modal = document.getElementById('confirmModal');
      const okBtn = document.getElementById('confirmOkBtn');
      const cancelBtn = document.getElementById('confirmCancelBtn');
      document.getElementById('confirmMessage').textContent = message;
      okBtn.textContent = okLabel || 'Delete';
      backdrop.classList.add('show');
      modal.classList.add('show');
      function cleanup(result){
        backdrop.classList.remove('show');
        modal.classList.remove('show');
        okBtn.removeEventListener('click', onOk);
        cancelBtn.removeEventListener('click', onCancel);
        backdrop.removeEventListener('click', onCancel);
        resolve(result);
      }
      function onOk(){ cleanup(true); }
      function onCancel(){ cleanup(false); }
      okBtn.addEventListener('click', onOk);
      cancelBtn.addEventListener('click', onCancel);
      backdrop.addEventListener('click', onCancel);
    });
  }

  /* ===================== Prompt dialog (custom — window.prompt is unreliable in sandboxed iframes) ===================== */
  function showPrompt(message, defaultValue, okLabel){
    return new Promise(resolve => {
      const backdrop = document.getElementById('promptBackdrop');
      const modal = document.getElementById('promptModal');
      const okBtn = document.getElementById('promptOkBtn');
      const cancelBtn = document.getElementById('promptCancelBtn');
      const input = document.getElementById('promptInput');
      document.getElementById('promptMessage').textContent = message;
      okBtn.textContent = okLabel || 'OK';
      input.value = defaultValue || '';
      backdrop.classList.add('show');
      modal.classList.add('show');
      requestAnimationFrame(() => { input.focus(); input.select(); });
      function onInputEvt(){ enforceUppercaseInput(input); }
      function cleanup(result){
        backdrop.classList.remove('show');
        modal.classList.remove('show');
        okBtn.removeEventListener('click', onOk);
        cancelBtn.removeEventListener('click', onCancel);
        backdrop.removeEventListener('click', onCancel);
        input.removeEventListener('keydown', onKeydown);
        input.removeEventListener('input', onInputEvt);
        resolve(result);
      }
      function onOk(){ cleanup(input.value.trim()); }
      function onCancel(){ cleanup(null); }
      function onKeydown(e){
        if(e.key === 'Enter'){ e.preventDefault(); onOk(); }
        else if(e.key === 'Escape'){ e.preventDefault(); onCancel(); }
      }
      okBtn.addEventListener('click', onOk);
      cancelBtn.addEventListener('click', onCancel);
      backdrop.addEventListener('click', onCancel);
      input.addEventListener('keydown', onKeydown);
      input.addEventListener('input', onInputEvt);
    });
  }

  /* ===================== DOM refs ===================== */
  const filmstripEl = document.getElementById('filmstrip');
  const sidebarListEl = document.getElementById('sidebarSceneList');
  const projectsListEl = document.getElementById('projectsList');
  const sidebarEl = document.getElementById('sidebar');
  const backdropEl = document.getElementById('backdrop');
  const titleEl = document.getElementById('projectTitle');
  const editToggleBtn = document.getElementById('editToggleBtn');
  const addSceneBtn = document.getElementById('addSceneBtn');

  /* ===================== Sidebar open/close ===================== */
  function openSidebar(){ sidebarEl.classList.add('open'); backdropEl.classList.add('show'); }
  function closeSidebar(){ sidebarEl.classList.remove('open'); backdropEl.classList.remove('show'); document.getElementById('projectSortMenu').classList.remove('open'); }
  document.getElementById('sidebarToggle').addEventListener('click', () => {
    sidebarEl.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  backdropEl.addEventListener('click', closeSidebar);

  document.getElementById('projectsFolderToggle').addEventListener('click', () => {
    document.getElementById('projectsFolderSection').classList.toggle('collapsed');
  });

  document.getElementById('topUndoBtn').addEventListener('click', doUndo);
  document.getElementById('topRedoBtn').addEventListener('click', doRedo);

  document.getElementById('viewBasicBtn').addEventListener('click', () => setViewMode('basic'));
  document.getElementById('viewTileBtn').addEventListener('click', () => setViewMode('tile'));
  function setViewMode(m){
    viewMode = m;
    document.getElementById('viewBasicBtn').classList.toggle('active', m === 'basic');
    document.getElementById('viewTileBtn').classList.toggle('active', m === 'tile');
    renderFilmstrip();
  }

  /* ===================== Edit mode ===================== */
  /* Finds whichever shot card is currently closest to the center of the viewport, so its
     position can be restored after something (a re-render, a CSS-driven width change) would
     otherwise leave the scroll position pointing at different content than what the user was
     actually looking at. */
  function findCenteredCutId(){
    const portrait = isPortrait();
    const selector = viewMode === 'tile' ? '.tile[data-unit-id]' : '.cut-unit[data-unit-id]';
    const els = filmstripEl.querySelectorAll(selector);
    if(els.length === 0) return null;
    const containerRect = filmstripEl.getBoundingClientRect();
    const centerPoint = portrait ? (containerRect.top + containerRect.height / 2) : (containerRect.left + containerRect.width / 2);
    let closestId = null, closestDist = Infinity;
    els.forEach(el => {
      const r = el.getBoundingClientRect();
      const mid = portrait ? (r.top + r.height / 2) : (r.left + r.width / 2);
      const dist = Math.abs(mid - centerPoint);
      if(dist < closestDist){ closestDist = dist; closestId = el.dataset.unitId; }
    });
    return closestId;
  }
  function restoreScrollToCut(id){
    const selector = viewMode === 'tile' ? '.tile[data-unit-id="' + id + '"]' : '.cut-unit[data-unit-id="' + id + '"]';
    const el = filmstripEl.querySelector(selector);
    if(!el) return;
    const portrait = isPortrait();
    el.scrollIntoView({ behavior: 'instant', inline: portrait ? 'nearest' : 'center', block: portrait ? 'center' : 'nearest' });
  }

  function setEditMode(on){
    const wasEditing = editMode;
    editMode = on;
    const anchorId = findCenteredCutId();
    document.body.classList.toggle('view-mode', !editMode);
    editToggleBtn.textContent = editMode ? 'Done' : 'Edit';
    editToggleBtn.classList.toggle('active', editMode);
    if(!editMode && editorModal.classList.contains('open')){
      closeEditor(true);
    }
    if(!editMode) closeNotesExpand();
    if(!editMode && selectMode){ exitSelectMode(); renderFilmstrip(); }
    if(wasEditing && !editMode) applySceneReordering();
    if(anchorId) restoreScrollToCut(anchorId);
    updateSelectButtonVisibility();
    document.querySelectorAll('.scene-input-top').forEach(el => { el.readOnly = appMode === 'trash' || !editMode; });
    document.querySelectorAll('.note-line').forEach(el => { el.contentEditable = (appMode === 'trash' || !editMode || selectMode) ? 'false' : 'true'; });
  }
  editToggleBtn.addEventListener('click', () => setEditMode(!editMode));

  /* ===================== Title editing ===================== */
  titleEl.addEventListener('input', () => {
    state.title = titleEl.textContent.trim() || 'Untitled Storyboard';
    debouncedSaveMeta();
    const proj = projects.find(p => p.id === currentProjectId);
    if(proj){ proj.title = state.title; debouncedSaveProjectsIndex(); }
    renderProjectsList();
  });
  titleEl.addEventListener('blur', () => {
    if(!titleEl.textContent.trim()) titleEl.textContent = 'Untitled Storyboard';
  });
  titleEl.addEventListener('keydown', e => {
    if(e.key === 'Enter'){ e.preventDefault(); titleEl.blur(); }
  });
  titleEl.addEventListener('paste', e => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text/plain');
    document.execCommand('insertText', false, text);
  });

  /* ===================== Scenes: numbering ===================== */
  function parseSceneNumber(s){
    const m = String(s || '').match(/(\d+)/);
    return m ? parseInt(m[1], 10) : null;
  }
  /* Extracts the custom label from a scene string formatted as "S#(number) - (NAME)".
     Returns '' if the scene has no such suffix (just a bare "S#3"). */
  function parseSceneName(s){
    const m = String(s || '').match(/^\s*S#\d+\s*-\s*(.+)$/);
    return m ? m[1].trim() : '';
  }
  function buildSceneText(number, name){
    return name ? ('S#' + number + ' - ' + name) : ('S#' + number);
  }
  function getNextSceneNumber(){
    let maxN = 0;
    state.order.forEach(id => {
      const n = parseSceneNumber(state.cuts[id].scene);
      if(n !== null && n > maxN) maxN = n;
    });
    return maxN + 1;
  }
  /* Finds the scene of whichever shot is currently nearest the center of the filmstrip
     viewport, so "+ Scene" can insert right after it instead of always at the very end.
     Only meaningful in the basic (non-tile) view of the main project; callers should
     fall back to the old append-at-end behavior when this returns null. */
  function getCurrentlyVisibleSceneText(){
    if(viewMode !== 'basic' || appMode !== 'main') return null;
    const units = Array.from(filmstripEl.querySelectorAll('.cut-unit[data-unit-id]'));
    if(units.length === 0) return null;
    const contRect = filmstripEl.getBoundingClientRect();
    const portrait = isPortrait();
    const center = portrait ? (contRect.top + contRect.height / 2) : (contRect.left + contRect.width / 2);
    let closest = null, closestDist = Infinity;
    units.forEach(u => {
      const r = u.getBoundingClientRect();
      const mid = portrait ? (r.top + r.height / 2) : (r.left + r.width / 2);
      const d = Math.abs(mid - center);
      if(d < closestDist){ closestDist = d; closest = u; }
    });
    if(!closest) return null;
    const cut = state.cuts[closest.dataset.unitId];
    if(!cut) return null;
    return (cut.scene || '').trim() || null;
  }
  addSceneBtn.addEventListener('click', () => {
    if(!editMode) return;
    pushUndoSnapshot();

    const visibleScene = getCurrentlyVisibleSceneText();
    const curNum = visibleScene ? parseSceneNumber(visibleScene) : null;
    let newN, insertAfterScene = null;

    if(curNum !== null){
      newN = curNum + 1;
      insertAfterScene = visibleScene;
      /* Shift every existing scene numbered >= newN up by one to make room. Build the
         old-text -> new-text mapping first (like applySceneRenumbering does) so renaming
         is based on original text, not on values already mutated earlier in the loop —
         renaming in-place in ascending order would let a shifted scene collide with the
         next one before it gets its turn. */
      const groups = computeSceneGroups();
      const mapping = new Map();
      groups.forEach(g => {
        const n = parseSceneNumber(g.scene);
        if(n !== null && n >= newN) mapping.set(g.scene, renumberScene(g.scene, n + 1));
      });
      if(mapping.size > 0){
        state.order.forEach(id => {
          const cur = (state.cuts[id].scene || '').trim();
          if(mapping.has(cur)){
            const newText = mapping.get(cur);
            if(newText !== cur){
              state.cuts[id].scene = newText;
              saveCut(id);
            }
          }
        });
      }
    } else {
      newN = getNextSceneNumber();
    }

    const sceneLabel = 'S#' + newN;
    const newIds = [];
    for(let i = 0; i < 10; i++){
      const id = uid('c');
      state.cuts[id] = { id, scene: sceneLabel, notes: '', image: null };
      newIds.push(id);
    }

    let insertIdx = state.order.length;
    if(insertAfterScene){
      let lastIdx = -1;
      state.order.forEach((oid, i) => { if((state.cuts[oid].scene || '').trim() === insertAfterScene) lastIdx = i; });
      insertIdx = (lastIdx === -1) ? state.order.length : lastIdx + 1;
    }
    state.order.splice(insertIdx, 0, ...newIds);

    resortOrderByScene();
    saveOrder();
    newIds.forEach(id => saveCut(id));
    renderFilmstrip();
    renderScenesList();
    requestAnimationFrame(() => jumpToCut(newIds[0]));
  });

  /* ===================== Rendering: filmstrip ===================== */
  function renderFilmstrip(){
    const isTrash = appMode === 'trash';
    filmstripEl.classList.toggle('tile-mode', viewMode === 'tile');
    openMenuUnitId = null;
    filmstripEl.innerHTML = '';
    const activeOrder = isTrash ? state.trashOrder : state.order;
    if(activeOrder.length === 0){
      filmstripEl.appendChild(buildEmptyState());
    } else if(viewMode === 'tile'){
      activeOrder.forEach((id, index) => filmstripEl.appendChild(buildTile(state.cuts[id], index)));
    } else if(isTrash){
      activeOrder.forEach((id, index) => filmstripEl.appendChild(buildCutUnit(state.cuts[id], index)));
    } else {
      filmstripEl.appendChild(buildGutter(0));
      activeOrder.forEach((id, index) => {
        const cut = state.cuts[id];
        filmstripEl.appendChild(buildCutUnit(cut, index));
        filmstripEl.appendChild(buildGutter(index + 1));
      });
    }
    updateSidebarCutCount();
    updateSelectToolbar();
  }

  function buildEmptyState(){
    const wrap = document.createElement('div');
    wrap.className = 'empty-state';

  /* ===================== Tile view (Frame-only grid for fast reordering) ===================== */
  function buildTile(cut, index){
    const isTrash = appMode === 'trash';
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.unitId = cut.id;
    /* guides behind, image/hint in front — same layering principle as the card and editor Frame */
    const guide239 = document.createElement('div');
    guide239.className = 'frame-guide-239';
    tile.appendChild(guide239);
    const guide133 = document.createElement('div');
    guide133.className = 'frame-guide-133';
    tile.appendChild(guide133);
    if(cut.image){
      const img = document.createElement('img');
      img.src = cut.image;
      tile.appendChild(img);
    } else {
      const hint = document.createElement('div');
      hint.className = 'tile-hint';
      hint.innerHTML = ICONS.pencil;
      tile.appendChild(hint);
    }
    const badge = document.createElement('div');
    badge.className = 'tile-badge';
    const shotNum = (isTrash && cut.trashedShotNumber != null) ? cut.trashedShotNumber : (index + 1);
    badge.textContent = String(shotNum).padStart(2, '0');
    tile.appendChild(badge);

    if(selectMode){
      const circle = buildSelectCircle(cut.id);
      circle.classList.add('tile-select-circle');
      tile.appendChild(circle);
      tile.addEventListener('click', e => {

        toggleCutSelection(cut.id, circle);
      });
    } else if(!isTrash){
      tile.addEventListener('pointerdown', e => onTilePointerDown(e, cut.id, tile));
    }
    return tile;

  function computeTargetIndexGrid(clientX, clientY, otherEntries){
    const portrait = isPortrait();
    let closest = null, closestDist = Infinity, closestIdx = 0;
    otherEntries.forEach((o, i) => {
      const cx = o.rect.left + o.rect.width / 2, cy = o.rect.top + o.rect.height / 2;
      const d = Math.hypot(clientX - cx, clientY - cy);
      if(d < closestDist){ closestDist = d; closest = o; closestIdx = i; }
    });
    if(!closest) return 0;
    const cx = closest.rect.left + closest.rect.width / 2, cy = closest.rect.top + closest.rect.height / 2;
    const past = portrait
      ? ((clientY > cy) || (Math.abs(clientY - cy) < closest.rect.height * 0.3 && clientX > cx))
      : ((clientX > cx) || (Math.abs(clientX - cx) < closest.rect.width * 0.3 && clientY > cy));
    return past ? closestIdx + 1 : closestIdx;
  }

  function onTilePointerDown(e, id, tileEl){
    if(e.pointerType === 'mouse' && e.button !== 0) return;
    const pointerId = e.pointerId;
    const startX = e.clientX, startY = e.clientY;
    const portrait = isPortrait();
    const startScroll = portrait ? filmstripEl.scrollTop : filmstripEl.scrollLeft;
    let phase = 'idle'; /* idle -> scrolling | drag | tap */

    const timer = setTimeout(() => {
      if(phase !== 'idle' || !editMode) return;
      phase = 'drag';
      beginDrag();
    }, 260);

    function onPreMove(ev){
      if(ev.pointerId !== pointerId) return;
      if(phase !== 'idle' && phase !== 'scrolling') return;
      const dx = ev.clientX - startX, dy = ev.clientY - startY;
      if(phase === 'idle'){
        if(Math.hypot(dx, dy) <= 8) return;
        /* Moved enough to be a swipe-to-browse, not a long-press-drag. Take over scrolling
           manually from here — .tile uses touch-action:none precisely so the browser never
           starts its own native pan for this gesture (that race with our long-press timer is
           what caused tiles to get stuck mid-drag: native scroll would already be underway by
           the time our JS drag logic tried to take over). */
        phase = 'scrolling';
        clearTimeout(timer);
      }
      ev.preventDefault();
      if(portrait) filmstripEl.scrollTop = startScroll - dy;
      else filmstripEl.scrollLeft = startScroll - dx;
    }
    function onPreUp(ev){
      if(ev.pointerId !== pointerId) return;
      if(phase !== 'idle' && phase !== 'scrolling') return;
      clearTimeout(timer);
      const wasIdle = phase === 'idle';
      cleanupPre();
      if(wasIdle){
        if(editMode){
          openEditor(id);
        } else {
          setViewMode('basic');
          requestAnimationFrame(() => jumpToCut(id));
        }
      }
    }
    function cleanupPre(){
      document.removeEventListener('pointermove', onPreMove);
      document.removeEventListener('pointerup', onPreUp);
      document.removeEventListener('pointercancel', onPreUp);
    }
    document.addEventListener('pointermove', onPreMove);
    document.addEventListener('pointerup', onPreUp);
    document.addEventListener('pointercancel', onPreUp);

    function beginDrag(){
      cleanupPre();
      tileEl.classList.add('dragging');
      const dragStartScroll = portrait ? filmstripEl.scrollTop : filmstripEl.scrollLeft;

      function getOtherEntries(){
        /* Re-query sibling rects on every call — caching them once at drag-start goes stale
           if the grid scrolls during the drag, which is what caused the reorder jitter
           in the other drag-reorder surfaces (project/scene/cut). */
        return Array.from(filmstripEl.querySelectorAll('.tile[data-unit-id]'))
          .filter(el => el.dataset.unitId !== id)
          .map(el => ({ id: el.dataset.unitId, rect: el.getBoundingClientRect() }));
      }
      let currentTarget = computeTargetIndexGrid(startX, startY, getOtherEntries());

      let scrollDir = 0, rafId = null;
      function autoScrollLoop(){
        if(scrollDir !== 0){
          if(portrait) filmstripEl.scrollTop += scrollDir * 14;
          else filmstripEl.scrollLeft += scrollDir * 14;
        }
        rafId = requestAnimationFrame(autoScrollLoop);
      }
      rafId = requestAnimationFrame(autoScrollLoop);

      function onMove(ev){
        if(ev.pointerId !== pointerId) return;
        ev.preventDefault();
        /* The tile stays put in the grid (only visually offset via transform), so container
           autoscroll moves the underlying grid on its own; compensate the manual translate by
           that same scroll delta so the tile doesn't drift away from the finger. */
        const scrollDelta = (portrait ? filmstripEl.scrollTop : filmstripEl.scrollLeft) - dragStartScroll;
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        const adjDx = portrait ? dx : dx + scrollDelta;
        const adjDy = portrait ? dy + scrollDelta : dy;
        tileEl.style.transform = 'translate(' + adjDx + 'px,' + adjDy + 'px) scale(1.08)';
        currentTarget = computeTargetIndexGrid(ev.clientX, ev.clientY, getOtherEntries());

        const contRect = filmstripEl.getBoundingClientRect();
        const edge = 50;
        if(portrait){
          if(ev.clientY < contRect.top + edge) scrollDir = -1;
          else if(ev.clientY > contRect.bottom - edge) scrollDir = 1;
          else scrollDir = 0;
        } else {
          if(ev.clientX < contRect.left + edge) scrollDir = -1;
          else if(ev.clientX > contRect.right - edge) scrollDir = 1;
          else scrollDir = 0;
        }
      }
      function onUp(ev){
        if(ev.pointerId !== pointerId) return;
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        document.removeEventListener('pointercancel', onUp);
        scrollDir = 0;
        if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
        tileEl.classList.remove('dragging');
        tileEl.style.transform = '';
        const arr = state.order.filter(x => x !== id);
        arr.splice(currentTarget, 0, id);
        const changed = arr.join(',') !== state.order.join(',');
        if(changed) pushUndoSnapshot();
        state.order = arr;
        if(changed) saveOrder();
        renderFilmstrip();
        requestAnimationFrame(() => flashUnit(id));
      }
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      document.addEventListener('pointercancel', onUp);
    }
  }

  function buildCutUnit(cut, index){

    sceneInput.maxLength = 24;

    sceneInput.addEventListener('input', () => {
      if(isTrash) return;

       .note-line pointer-events:none rule) and a tap anywhere on the card selects it instead. */
    card.addEventListener('click', () => {
      if(!selectMode || !selectCircleEl) return;
      toggleCutSelection(cut.id, selectCircleEl);
    });

    /* frame — drawing only */
    const frame = document.createElement('div');
    frame.className = 'frame';

    const guide239 = document.createElement('div');
    guide239.className = 'frame-guide-239';
    frame.appendChild(guide239);

    const guide133 = document.createElement('div');
    guide133.className = 'frame-guide-133';
    frame.appendChild(guide133);

    const canvas = document.createElement('canvas');
    canvas.className = 'frame-canvas';
    frame.appendChild(canvas);

    const hint = document.createElement('div');
    hint.className = 'frame-hint';
    hint.innerHTML = ICONS.pencil + '<span>Tap to draw</span>';
    frame.appendChild(hint);

    setupInlineCanvas(canvas, cut, unit, hint);

    /* notes */
    const notesWrap = document.createElement('div');
    notesWrap.className = 'notes';
    const linesEl = buildNotesLines(cut);
    notesWrap.appendChild(linesEl);
    setupNotesLongPress(notesWrap, cut);

    card.appendChild(frame);
    card.appendChild(notesWrap);

    unit.appendChild(handleRow);
    unit.appendChild(card);

    return unit;
  }

  /* ===================== Notes lines ===================== */
  function stripTagsToText(html){
    const tmp = document.createElement('div');
    tmp.innerHTML = html || '';
    return tmp.textContent || '';
  }
  function placeCaretAtStart(el){
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(true);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
  function placeCaretAtEnd(el){
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function getRichLinesForCut(cut){
    let htmlLines;
    if(typeof cut.notesHtml === 'string' && cut.notesHtml){
      const tmp = document.createElement('div');
      tmp.innerHTML = sanitizeRichHtml(cut.notesHtml);
      if(tmp.children.length > 0 && Array.from(tmp.children).every(c => c.tagName === 'DIV')){
        htmlLines = Array.from(tmp.children).map(c => c.innerHTML);
      } else {
        htmlLines = [tmp.innerHTML];
      }
    } else {
      htmlLines = (cut.notes || '').split('\n').map(l => escapeHtml(l));
    }
    let lastNonEmpty = -1;
    htmlLines.forEach((l, i) => { if(stripTagsToText(l).trim() !== '') lastNonEmpty = i; });
    const length = Math.max(MIN_LINES, lastNonEmpty + 2, htmlLines.length);
    const lines = [];
    for(let i = 0; i < length; i++) lines.push(htmlLines[i] || '');
    return lines;
  }

  function buildLinesInto(cut, wrap){
    wrap.innerHTML = '';
    const lines = getRichLinesForCut(cut);
    lines.forEach((html, i) => wrap.appendChild(buildLineDiv(cut, wrap, i, html)));
  }

  function buildNotesLines(cut){
    const wrap = document.createElement('div');
    wrap.className = 'notes-lines';
    buildLinesInto(cut, wrap);
    wrap.addEventListener('pointerdown', e => {
      if(!editMode || selectMode) return;
      if(e.target.classList && e.target.classList.contains('note-line')) return;
      const lines = wrap.querySelectorAll('.note-line');
      const last = lines[lines.length - 1];
      if(last){ last.focus(); placeCaretAtEnd(last); }
    });
    return wrap;
  }

  function buildLineDiv(cut, wrap, index, html){
    const div = document.createElement('div');
    div.className = 'note-line';
    div.contentEditable = (appMode === 'trash' || !editMode || selectMode) ? 'false' : 'true';
    div.innerHTML = html || '';
    if(index === 0 && !html) div.setAttribute('data-placeholder', 'Blocking, camera moves, notes…');
    div.addEventListener('input', () => onLineInput(cut, wrap, div));
    div.addEventListener('keydown', e => onLineKeydown(e, cut, wrap, div));
    return div;
  }

  /* Single source of truth for a cut's notes: cut.notesHtml (rich, per-line divs) — cut.notes
     is just a derived plain-text mirror kept for simple/legacy readers. Both the compact card
     and the expand overlay read/write the same notesHtml, so formatting applied in either place
     shows up in both. */
  function syncNotesFromLines(cut, wrap){
    const lines = Array.from(wrap.querySelectorAll('.note-line'));
    cut.notesHtml = lines.map(l => '<div>' + (l.innerHTML || '<br>') + '</div>').join('');
    cut.notes = lines.map(l => stripTagsToText(l.innerHTML)).join('\n');
    debouncedSaveCut(cut.id);
  }

  function onLineInput(cut, wrap, div){
    if(!editMode || appMode === 'trash') return;
    checkLineOverflow(cut, wrap, div);
    syncNotesFromLines(cut, wrap);
    trimTrailingEmptyLines(wrap);
  }

  /* ---- Auto-wrap: when a line's content no longer fits its box, push the overflow onto the
     start of the next line. Uses caretRangeFromPoint to find exactly where the line's content
     stops fitting — this naturally accounts for bold/larger glyphs affecting width, unlike a
     manual character-width measurement, and lets the moved fragment keep its own formatting. ---- */
  function checkLineOverflow(cut, wrap, div){
    if(div.contentEditable !== 'true') return;
    let current = div;
    let moved = false;
    let iterations = 0;
    while(current && iterations < 50){
      iterations++;
      if(current.scrollWidth <= current.clientWidth + 1) break;
      const rect = current.getBoundingClientRect();
      const cs = getComputedStyle(current);
      const paddingR = parseFloat(cs.paddingRight) || 0;
      const edgeX = rect.right - paddingR - 2;
      const y = rect.top + rect.height / 2;
      let point = null;
      if(document.caretRangeFromPoint){
        point = document.caretRangeFromPoint(edgeX, y);
      } else if(document.caretPositionFromPoint){
        const pos = document.caretPositionFromPoint(edgeX, y);
        if(pos) point = { startContainer: pos.offsetNode, startOffset: pos.offset };
      }
      if(!point || !current.contains(point.startContainer)) break;
      const fullRange = document.createRange();
      fullRange.selectNodeContents(current);
      try{ fullRange.setStart(point.startContainer, point.startOffset); }catch(err){ break; }
      if(fullRange.collapsed) break;
      const fragment = fullRange.extractContents();

      const lines = Array.from(wrap.querySelectorAll('.note-line'));
      const idx = lines.indexOf(current);
      let nextLine = lines[idx + 1];
      if(nextLine){
        nextLine.insertBefore(fragment, nextLine.firstChild);
      } else {
        nextLine = buildLineDiv(cut, wrap, idx + 1, '');
        nextLine.appendChild(fragment);
        wrap.appendChild(nextLine);
      }
      current = nextLine;
      moved = true;
    }
    if(moved && current){
      current.focus();
      placeCaretAtEnd(current);
    }
  }

  function trimTrailingEmptyLines(wrap){
    const lines = Array.from(wrap.querySelectorAll('.note-line'));
    let i = lines.length - 1;
    let emptyCount = 0;
    while(i >= 0 && stripTagsToText(lines[i].innerHTML).trim() === ''){ emptyCount++; i--; }
    const excess = emptyCount - 1;
    if(excess > 0 && lines.length - excess >= MIN_LINES){
      for(let k = 0; k < excess; k++){
        const last = wrap.lastElementChild;
        if(!last || document.activeElement === last) break;
        wrap.removeChild(last);
      }
    }
  }

  function onLineKeydown(e, cut, wrap, div){
    const lines = Array.from(wrap.querySelectorAll('.note-line'));
    const idx = lines.indexOf(div);
    if(e.key === 'Enter'){
      e.preventDefault();
      if(div.contentEditable !== 'true') return;
      let afterFragment = document.createDocumentFragment();
      const sel = window.getSelection();
      if(sel.rangeCount > 0){
        const range = sel.getRangeAt(0);
        if(div.contains(range.startContainer)){
          const fullRange = document.createRange();
          fullRange.selectNodeContents(div);
          try{ fullRange.setStart(range.startContainer, range.startOffset); }catch(err){}
          afterFragment = fullRange.extractContents();
        }
      }
      const newLine = buildLineDiv(cut, wrap, idx + 1, '');
      newLine.appendChild(afterFragment);
      if(div.nextSibling) wrap.insertBefore(newLine, div.nextSibling);
      else wrap.appendChild(newLine);
      syncNotesFromLines(cut, wrap);
      newLine.focus();
      placeCaretAtStart(newLine);
    } else if(e.key === 'ArrowDown'){
      if(idx < lines.length - 1){ e.preventDefault(); lines[idx + 1].focus(); placeCaretAtStart(lines[idx + 1]); }
    } else if(e.key === 'ArrowUp'){
      if(idx > 0){ e.preventDefault(); lines[idx - 1].focus(); placeCaretAtStart(lines[idx - 1]); }
    }
  }

  /* ===================== Notes expand overlay (long-press) ===================== */
  const notesExpandBackdrop = document.getElementById('notesExpandBackdrop');
  const notesExpandPanel = document.getElementById('notesExpandPanel');
  const notesExpandLines = document.getElementById('notesExpandLines');
  const notesExpandLabel = document.getElementById('notesExpandLabel');
  let expandedCutId = null;

  /* cut.notesHtml can come from an imported backup file, not just this app's own editor —
     strip it down to a small safe allowlist before ever assigning it via innerHTML. */
  function sanitizeRichHtml(html){
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    const allowedTags = new Set(['div', 'br', 'b', 'strong', 'i', 'em', 'u', 's', 'strike', 'span', 'font']);
    (function walk(node){
      Array.from(node.childNodes).forEach(child => {
        if(child.nodeType !== 1){ return; }
        const tag = child.tagName.toLowerCase();
        if(!allowedTags.has(tag)){
          child.replaceWith(document.createTextNode(child.textContent));
          return;
        }
        Array.from(child.attributes).forEach(attr => {
          const name = attr.name.toLowerCase();
          if(name === 'style'){
            const m = attr.value.match(/color\s*:\s*[^;]+/i);
            if(m) child.setAttribute('style', m[0]); else child.removeAttribute('style');
          } else if(name !== 'color'){
            child.removeAttribute(attr.name);
          }
        });
        walk(child);
      });
    })(tmp);
    return tmp.innerHTML;
  }
